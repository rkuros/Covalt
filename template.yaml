AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Covalt - LINE reservation management system

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: production
        DATABASE_URL: !Ref DatabaseUrl
        ENCRYPTION_KEY: !Ref EncryptionKey
        LINE_API_BASE_URL: https://api.line.me

Parameters:
  DatabaseUrl:
    Type: String
    Description: Neon PostgreSQL connection string
    NoEcho: true
  EncryptionKey:
    Type: String
    Description: AES-256 encryption key (64-char hex)
    NoEcho: true

Resources:
  # --- Static Site (S3 + CloudFront) ---
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${StaticSiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-static-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  BasicAuthFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-basic-auth'
      AutoPublish: true
      FunctionConfig:
        Comment: Basic authentication for static site
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var headers = request.headers;
          var expected = "Basic Y292YWx0LWRldjpOdGhvSUlKQ3Z3bjJPK21D";
          if (!headers.authorization || headers.authorization.value !== expected) {
            return {
              statusCode: 401,
              statusDescription: "Unauthorized",
              headers: {
                "www-authenticate": { value: 'Basic realm="Covalt"' }
              }
            };
          }
          return request;
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: mock.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt BasicAuthFunction.FunctionARN
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # --- API Lambda ---
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: app/
      Handler: dist/src/lambda.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
    Metadata:
      BuildMethod: makefile

  # --- Reminder Cron Lambda ---
  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: app/
      Handler: dist/src/reminder-handler.handler
      Timeout: 60
      Events:
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 hour)
    Metadata:
      BuildMethod: makefile

  # --- HTTP API Gateway ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  ApiFunctionArn:
    Description: API Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
  ReminderFunctionArn:
    Description: Reminder Lambda Function ARN
    Value: !GetAtt ReminderFunction.Arn
  StaticSiteUrl:
    Description: CloudFront URL for static site
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  StaticSiteBucketName:
    Description: S3 bucket name for static site
    Value: !Ref StaticSiteBucket
