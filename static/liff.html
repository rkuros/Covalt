<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>予約</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ec5b13;--primary-dark:#c44b10;--bg:#f8f6f6;--card:#FFF;
  --text:#1A1A2E;--sub:#6B7280;--border:#E5E7EB;--danger:#EF4444;
  --nav-h:56px;--header-h:44px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#1e293b;border-bottom:1px solid rgba(236,91,19,.1);display:flex;align-items:center;padding:0 16px;z-index:10;font-weight:600;font-size:17px}
header .name{margin-left:8px;font-weight:400;font-size:14px;opacity:.85}

main{padding:calc(var(--header-h) + 12px) 12px calc(var(--nav-h) + 12px);min-height:100%}
.view{display:none}.view.active{display:block}

nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-top:1px solid rgba(236,91,19,.1);display:flex;align-items:center;z-index:10}
nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sub);font-size:10px;cursor:pointer;transition:.2s}
nav button.active{color:var(--primary)}
nav button svg{width:24px;height:24px;fill:currentColor}

/* Cards */
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-date{font-size:13px;color:var(--sub);margin-bottom:4px}
.card-time{font-size:18px;font-weight:600}
.card-status{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:500;margin-top:6px}
.status-confirmed{background:rgba(236,91,19,.1);color:#ec5b13}
.status-cancelled{background:rgba(220,38,38,.08);color:#dc2626}
.status-completed{background:#f1f5f9;color:#64748b}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-dark)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);margin-top:8px;padding:10px;font-size:13px}
.btn-danger:active{background:#FEF2F2}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-header button{background:none;border:none;font-size:20px;color:var(--sub);cursor:pointer;padding:4px 12px}
.cal-header .cal-title{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;background:var(--card);border-radius:12px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cal-dow{text-align:center;font-size:11px;color:var(--sub);padding:4px 0;font-weight:500}
.cal-dow:first-child{color:#EF4444}
.cal-dow:last-child{color:#3B82F6}
.cal-day{text-align:center;padding:8px 0;font-size:14px;border-radius:50%;cursor:pointer;transition:.15s;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.cal-day:hover{background:rgba(236,91,19,.05)}
.cal-day.today{font-weight:700}
.cal-day.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--primary)}
.cal-day.selected{background:var(--primary);color:#fff;font-weight:600}
.cal-day.selected::after{background:#fff}
.cal-day.disabled{color:var(--border);cursor:default;pointer-events:none}
.cal-day.empty{pointer-events:none}
.cal-day.sun{color:#EF4444}
.cal-day.sat{color:#3B82F6}
.cal-day.selected.sun,.cal-day.selected.sat{color:#fff}

.slot-section-title{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.slot-btn{padding:12px 8px;border:1.5px solid var(--primary);border-radius:10px;background:var(--card);color:var(--primary);font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:.2s}
.slot-btn:active,.slot-btn.selected{background:var(--primary);color:#fff}
.slot-btn:disabled{border-color:var(--border);color:var(--sub);cursor:not-allowed;background:var(--bg)}

.empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}
.confirm-box{background:var(--card);border-radius:12px;padding:20px;margin-top:16px;text-align:center}
.confirm-box .time-label{font-size:22px;font-weight:700;margin:8px 0}
.toast{position:fixed;top:calc(var(--header-h)+8px);left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:16px;padding:24px;margin:16px;max-width:320px;width:100%}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:12px}
.modal-box .policy-text{font-size:13px;color:#6B7280;margin-bottom:16px;white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto}
.modal-box .modal-btns{display:flex;gap:8px}
.modal-box .modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.modal-box .btn-cancel-confirm{background:#EF4444;color:#fff}
.modal-box .btn-cancel-back{background:#F3F4F6;color:#374151}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<header>
  <span>予約</span>
  <span class="name" id="user-name"></span>
</header>

<main>
  <!-- 予約する -->
  <div id="view-book" class="view active">
    <div id="calendar-area"></div>
    <div id="slots-area"></div>
    <div id="confirm-area" style="display:none">
      <div class="confirm-box">
        <div class="card-date" id="confirm-date"></div>
        <div class="time-label" id="confirm-time"></div>
        <button class="btn btn-primary" id="btn-book" onclick="bookSlot()">この時間で予約する</button>
      </div>
    </div>
    <div id="booking-success" style="display:none"></div>
  </div>

  <!-- 予約確認 -->
  <div id="view-confirm" class="view">
    <div id="upcoming-list"></div>
  </div>

  <!-- 施術履歴 -->
  <div id="view-history" class="view">
    <div id="history-list"></div>
  </div>
</main>

<nav>
  <button class="active" data-page="book" onclick="switchTab('book')">
    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
    予約する
  </button>
  <button data-page="confirm" onclick="switchTab('confirm')">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    予約確認
  </button>
  <button data-page="history" onclick="switchTab('history')">
    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    施術履歴
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const LIFF_ID = '2009361608-txRFy229';
const API = 'https://4n1y1vgmbl.execute-api.ap-southeast-1.amazonaws.com';
let accessToken = null;
let ownerId = null;
let displayName = '';
let selectedDate = new Date();
let calViewYear = selectedDate.getFullYear();
let calViewMonth = selectedDate.getMonth();
let selectedSlot = null;
let cachedPolicy = null;

// ── Parse params (handle liff.state) ──
function parseLiffParams() {
  const search = new URLSearchParams(location.search);
  const liffState = search.get('liff.state');
  if (liffState) return new URLSearchParams(liffState.replace(/^\?/, ''));
  if (location.search && location.search.length > 1) return new URLSearchParams(location.search);
  if (location.hash.includes('?')) return new URLSearchParams(location.hash.split('?')[1]);
  return new URLSearchParams();
}

// ── Init ──
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    const params = parseLiffParams();
    ownerId = params.get('ownerId');
    const page = params.get('page') || 'book';

    if (!liff.isLoggedIn()) {
      const redirectUri = location.origin + location.pathname + '?ownerId=' + (ownerId || '') + '&page=' + page;
      liff.login({ redirectUri });
      return;
    }

    accessToken = liff.getAccessToken();
    const profile = await liff.getProfile();
    displayName = profile.displayName;
    document.getElementById('user-name').textContent = displayName;

    document.getElementById('loading').style.display = 'none';
    switchTab(page);
  } catch (e) {
    console.error('LIFF init failed', e);
    document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:20px;color:#6B7280"><p>読み込みに失敗しました</p><p style="font-size:12px;margin-top:8px">'+e.message+'</p></div>';
  }
}

// ── API helper ──
async function api(method, path, body, headers) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...headers } };
  if (accessToken) opts.headers['Authorization'] = 'Bearer ' + accessToken;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error(data?.message || 'Error ' + res.status);
  return data;
}

// ── Tab navigation ──
function switchTab(page) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + page).classList.add('active');
  document.querySelector('nav button[data-page="'+page+'"]').classList.add('active');

  if (page === 'book') { renderCalendar(); loadSlots(); }
  if (page === 'confirm') loadUpcoming();
  if (page === 'history') loadHistory();
}

// ── Calendar ──
function renderCalendar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const year = calViewYear, month = calViewMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let html = '<div class="cal-header">';
  html += '<button onclick="changeMonth(-1)">&lsaquo;</button>';
  html += '<span class="cal-title">' + year + '年 ' + monthNames[month] + '</span>';
  html += '<button onclick="changeMonth(1)">&rsaquo;</button>';
  html += '</div>';

  html += '<div class="cal-grid">';
  const dows = ['日','月','火','水','木','金','土'];
  for (let i = 0; i < 7; i++) html += '<div class="cal-dow">' + dows[i] + '</div>';

  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const isPast = date < today;
    const isToday = date.getTime() === today.getTime();
    const isSelected = formatDate(date) === formatDate(selectedDate);
    const dow = date.getDay();

    let cls = 'cal-day';
    if (isPast) cls += ' disabled';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';

    html += '<div class="' + cls + '" onclick="selectDate(' + year + ',' + month + ',' + d + ')">' + d + '</div>';
  }
  html += '</div>';

  document.getElementById('calendar-area').innerHTML = html;
}

function changeMonth(delta) {
  calViewMonth += delta;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCalendar();
}

function selectDate(y, m, d) {
  const date = new Date(y, m, d);
  const today = new Date(); today.setHours(0,0,0,0);
  if (date < today) return;
  selectedDate = date;
  selectedSlot = null;
  document.getElementById('confirm-area').style.display = 'none';
  renderCalendar();
  loadSlots();
}

// ── Date helpers ──
function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDateJP(d) {
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  return (d.getMonth()+1) + '月' + d.getDate() + '日 (' + dow + ')';
}

// ── Load available slots ──
async function loadSlots() {
  if (!ownerId) {
    document.getElementById('slots-area').innerHTML = '<div class="empty">店舗情報が見つかりません</div>';
    return;
  }
  document.getElementById('slots-area').innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const data = await api('GET', '/api/slots/available?ownerId=' + ownerId + '&date=' + formatDate(selectedDate));
    if (!data.slots || data.slots.length === 0) {
      document.getElementById('slots-area').innerHTML = '<div class="empty">この日の空きはありません</div>';
      return;
    }
    const available = data.slots.filter(s => s.status === 'available');
    if (available.length === 0) {
      document.getElementById('slots-area').innerHTML = '<div class="empty">この日の空きはありません</div>';
      return;
    }
    let html = '<div class="slot-section-title">' + formatDateJP(selectedDate) + ' の空き</div>';
    html += '<div class="slot-grid">';
    for (const s of available) {
      html += '<button class="slot-btn" data-slot-id="' + s.slotId + '" data-start="' + s.startTime + '" data-end="' + s.endTime + '" data-dur="' + s.durationMinutes + '" onclick="selectSlot(this)">' + s.startTime + '</button>';
    }
    html += '</div>';
    document.getElementById('slots-area').innerHTML = html;
  } catch (e) {
    document.getElementById('slots-area').innerHTML = '<div class="empty">読み込みに失敗しました</div>';
  }
}

function selectSlot(el) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSlot = {
    slotId: el.dataset.slotId,
    startTime: el.dataset.start,
    endTime: el.dataset.end,
    durationMinutes: parseInt(el.dataset.dur),
  };
  document.getElementById('confirm-date').textContent = formatDateJP(selectedDate);
  document.getElementById('confirm-time').textContent = selectedSlot.startTime + ' - ' + selectedSlot.endTime;
  document.getElementById('confirm-area').style.display = 'block';
  document.getElementById('btn-book').disabled = false;
}

// ── Book slot ──
async function bookSlot() {
  if (!selectedSlot) return;
  const btn = document.getElementById('btn-book');
  btn.disabled = true;
  btn.textContent = '予約中...';
  try {
    const dateTime = formatDate(selectedDate) + 'T' + selectedSlot.startTime + ':00';
    const bookedDate = formatDateJP(selectedDate);
    const bookedTime = selectedSlot.startTime + ' - ' + selectedSlot.endTime;
    await api('POST', '/api/reservations', {
      ownerId: ownerId,
      slotId: selectedSlot.slotId,
      dateTime: dateTime,
      durationMinutes: selectedSlot.durationMinutes,
    });
    showToast('予約が完了しました');
    selectedSlot = null;
    btn.textContent = 'この時間で予約する';
    btn.disabled = false;
    // Show success UI in a separate overlay (preserve confirm-area DOM)
    document.getElementById('confirm-area').style.display = 'none';
    var successEl = document.getElementById('booking-success');
    successEl.innerHTML = '<div class="confirm-box" style="text-align:center">'
      + '<div style="font-size:48px;margin-bottom:12px;color:var(--primary)">&#10003;</div>'
      + '<div style="font-size:18px;font-weight:700;margin-bottom:8px">予約が完了しました</div>'
      + '<div class="card-date">' + bookedDate + '</div>'
      + '<div style="font-size:16px;font-weight:600;margin:4px 0">' + bookedTime + '</div>'
      + '<button class="btn btn-primary" style="margin-top:16px" onclick="closeBookingSuccess()">OK</button>'
      + '</div>';
    successEl.style.display = 'block';
  } catch (e) {
    showToast(e.message || '予約に失敗しました');
    btn.textContent = 'この時間で予約する';
    btn.disabled = false;
  }
}

function closeBookingSuccess() {
  document.getElementById('booking-success').style.display = 'none';
  document.getElementById('booking-success').innerHTML = '';
  loadSlots();
}

// ── Upcoming reservations ──
async function loadUpcoming() {
  const el = document.getElementById('upcoming-list');
  el.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const data = await api('GET', '/api/reservations/upcoming', null, { 'x-owner-id': ownerId });
    if (!data.reservations || data.reservations.length === 0) {
      el.innerHTML = '<div class="empty">予約はありません</div>';
      return;
    }
    el.innerHTML = data.reservations.map(r => reservationCard(r, true)).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty">予約はありません</div>';
  }
}

// ── History ──
async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const data = await api('GET', '/api/reservations/history', null, { 'x-owner-id': ownerId });
    const history = (data.reservations || []).filter(r => r.status !== 'cancelled');
    if (!history.length) {
      el.innerHTML = '<div class="empty">施術履歴はありません</div>';
      return;
    }
    el.innerHTML = history.map(r => reservationCard(r, false)).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty">施術履歴はありません</div>';
  }
}

function reservationCard(r, showCancel) {
  const dt = new Date(r.dateTime);
  const dateStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + ['日','月','火','水','木','金','土'][dt.getDay()] + ')';
  const time = String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
  const endMin = dt.getMinutes() + r.durationMinutes;
  const endH = dt.getHours() + Math.floor(endMin / 60);
  const endM = endMin % 60;
  const endTime = String(endH).padStart(2,'0') + ':' + String(endM).padStart(2,'0');

  const statusMap = { confirmed: '確定', cancelled: 'キャンセル済', completed: '完了' };
  const statusClass = 'status-' + (r.status || 'confirmed');

  let html = '<div class="card">';
  html += '<div class="card-date">' + dateStr + '</div>';
  html += '<div class="card-time">' + time + ' - ' + endTime + '</div>';
  html += '<span class="card-status ' + statusClass + '">' + (statusMap[r.status] || r.status) + '</span>';
  if (showCancel && r.status === 'confirmed') {
    html += '<button class="btn btn-danger" onclick="cancelReservation(\'' + r.reservationId + '\',this)">キャンセル</button>';
  }
  html += '</div>';
  return html;
}

async function fetchCancellationPolicy() {
  if (cachedPolicy !== null) return cachedPolicy;
  try {
    const data = await api('GET', '/api/schedule/public-settings?ownerId=' + ownerId);
    cachedPolicy = data.cancellationPolicy || '';
  } catch (e) {
    cachedPolicy = '';
  }
  return cachedPolicy;
}

async function cancelReservation(id, btn) {
  const policy = await fetchCancellationPolicy();

  let modalHtml = '<div class="modal-overlay" id="cancel-modal" onclick="if(event.target===this)closeCancelModal()">';
  modalHtml += '<div class="modal-box">';
  modalHtml += '<h3>予約をキャンセルしますか？</h3>';
  if (policy) {
    modalHtml += '<div class="policy-text">' + policy.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>';
  }
  modalHtml += '<div class="modal-btns">';
  modalHtml += '<button class="btn-cancel-back" onclick="closeCancelModal()">戻る</button>';
  modalHtml += '<button class="btn-cancel-confirm" onclick="closeCancelModal();doCancelReservation(\'' + id + '\')">キャンセルする</button>';
  modalHtml += '</div></div></div>';

  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function closeCancelModal() {
  const m = document.getElementById('cancel-modal');
  if (m) m.remove();
}

async function doCancelReservation(id) {
  try {
    await api('PUT', '/api/reservations/' + id + '/cancel');
    showToast('予約をキャンセルしました');
    loadUpcoming();
  } catch (e) {
    showToast(e.message || 'キャンセルに失敗しました');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
