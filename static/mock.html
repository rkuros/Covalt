<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768, height=1024, initial-scale=1.0">
<title>Covalt - 予約管理システム</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { "primary": "#ec5b13" },
      fontFamily: { "display": ["Inter"] },
      borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
    },
  },
}
</script>
<style>
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#e8e8e8;color:#333;}

/* === Top Tab === */
.top-tab{display:flex;justify-content:center;gap:0;padding:16px 16px 0;background:#e8e8e8;}
.top-tab button{padding:10px 32px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#ccc;color:#666;border-radius:8px 8px 0 0;}
.top-tab button.active{background:#fff;color:#333;}

/* === Device frames === */
.device-wrap{display:flex;justify-content:center;padding:0 16px 32px;background:#e8e8e8;}
.device-wrap.hidden{display:none;}
.phone{width:375px;height:740px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}
.tablet{width:620px;height:820px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}

/* ==================== */
/* === CUSTOMER SIDE === */
/* ==================== */
/* Customer UI is now rendered via iframe from liff.html */

/* ================== */
/* === OWNER SIDE === */
/* ================== */
/* Owner styles handled by Tailwind - minimal overrides only */
.ow-input{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:0.5rem;font-size:13px;outline:none;transition:border-color .2s;}
.ow-input:focus{border-color:#ec5b13;box-shadow:0 0 0 3px rgba(236,91,19,.1);}
.ow-hours-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;flex-wrap:wrap;}
.ow-hours-row label{width:40px;font-weight:600;color:#475569;}
.ow-hours-row select,.ow-hours-row input[type="time"]{padding:6px 8px;border:1px solid #e2e8f0;border-radius:0.5rem;font-size:12px;outline:none;}
.ow-hours-row select:focus,.ow-hours-row input[type="time"]:focus{border-color:#ec5b13;}
.ow-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px;}
.ow-cal-cell{min-height:80px;padding:4px 6px;font-size:11px;cursor:pointer;position:relative;background:#fff;border-radius:0.5rem;}
.ow-cal-cell:hover{background:rgba(236,91,19,.04);}
.ow-cal-cell.ow-other{opacity:.35;}
.ow-cal-cell.ow-today{background:rgba(236,91,19,.06);}
.ow-cal-cell.ow-holiday{background:#fff5f5;}
.ow-cal-cell .ow-num{font-weight:600;font-size:12px;margin-bottom:2px;}
.ow-cal-cell.ow-today .ow-num{color:#ec5b13;}
.ow-cal-cell.ow-holiday .ow-num{color:#dc2626;text-decoration:line-through;}
.ow-evt{padding:2px 4px;border-radius:4px;margin-top:1px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.ow-evt.ow-available{background:rgba(16,185,129,.1);color:#059669;}
.ow-evt.ow-confirmed{background:rgba(236,91,19,.1);color:#ec5b13;}
.ow-evt.ow-cancelled{background:rgba(220,38,38,.08);color:#dc2626;}
.ow-evt.ow-completed{background:#f1f5f9;color:#64748b;}

/* Toast */
.toast{position:fixed;top:60px;right:20px;background:#2d3436;color:#fff;padding:14px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;}
.toast.show{opacity:1;}
.toast.error{background:#d32f2f;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;justify-content:center;align-items:center;z-index:100;display:none;}
.modal{background:#fff;border-radius:16px;padding:24px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1e293b;}

/* Loading */
.loading{text-align:center;padding:40px;color:#94a3b8;font-size:13px;}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:9999;}
.loading-overlay .spinner{width:36px;height:36px;border:3px solid #fed7aa;border-top-color:#ec5b13;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.is-loading{opacity:0.6;pointer-events:none;}

/* API indicator */
.api-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.api-badge.live{background:#e8f5e9;color:#2e7d32;}
.api-badge.mock{background:#fff3e0;color:#e65100;}
</style>
</head>
<body>

<div class="top-tab">
  <button onclick="switchView('customer')">顧客側（LINE / スマホ）</button>
  <button class="active" onclick="switchView('owner')">オーナー側（iPad / タブレット）</button>
</div>

<!-- ========== CUSTOMER (Phone) ========== -->
<div class="device-wrap hidden" id="customerView">
  <div class="phone">
    <iframe id="customerIframe" style="width:100%;height:100%;border:none;" src=""></iframe>
    <div id="customerLoginMsg" style="display:none;position:absolute;inset:0;background:#f8f6f6;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:14px;color:#64748b;">
      <span style="font-size:40px;">&#128274;</span>
      <div>先にオーナー側タブでログインしてください</div>
    </div>
  </div>
</div>

<!-- ========== OWNER (Tablet) ========== -->
<div class="device-wrap" id="ownerView">
  <div style="width:768px;height:1024px;background:#f8f6f6;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;" id="tabletDevice">
    <!-- Login -->
    <div id="tabletLogin" style="display:flex;flex-direction:column;height:100%;">
      <header class="flex items-center px-6 py-4 border-b border-primary/10 bg-white/50 backdrop-blur-md flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined text-lg">event_upcoming</span></div>
          <h1 class="text-xl font-bold tracking-tight text-slate-900">Covalt</h1>
        </div>
      </header>
      <div class="flex-1 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-sm p-8 w-80">
          <h2 class="text-lg font-bold text-center mb-6 text-slate-800">ログイン</h2>
          <div class="text-red-500 text-sm mb-3" id="loginError" style="display:none;"></div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-1">メールアドレス</label>
            <input class="ow-input" id="loginEmail" type="email" placeholder="メールアドレス">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-1">パスワード</label>
            <input class="ow-input" id="loginPass" type="password" placeholder="パスワード">
          </div>
          <button class="w-full py-3 bg-primary hover:bg-orange-600 text-white rounded-lg text-sm font-bold transition-colors" onclick="doLogin()" id="loginBtn">ログイン</button>
          <p class="text-center mt-3 text-[10px] text-slate-400">API: ap-southeast-1</p>
        </div>
      </div>
    </div>
    <!-- Main app -->
    <div id="tabletApp" style="display:none;flex-direction:column;height:100%;">
      <header class="flex items-center justify-between px-6 py-4 border-b border-primary/10 bg-white/50 backdrop-blur-md flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined text-lg">event_upcoming</span></div>
          <h1 class="text-xl font-bold tracking-tight text-slate-900">Covalt</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-400" id="userEmail"></span>
          <button class="p-2 rounded-full hover:bg-primary/10 text-slate-500 transition-colors" onclick="doLogout()" title="ログアウト">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto" id="tabBody"><div class="px-6 py-6" id="mainContent"></div></main>
      <nav class="bg-white/80 backdrop-blur-lg border-t border-primary/10 px-4 py-2 pb-5 flex items-center justify-around flex-shrink-0" id="tabNav">
        <button class="flex flex-col items-center gap-1 text-primary transition-colors" data-page="dashboard" onclick="showPage('dashboard')">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">list_alt</span>
          <span class="text-[10px] font-bold">予約一覧</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="schedule" onclick="showPage('schedule')">
          <span class="material-symbols-outlined">calendar_today</span>
          <span class="text-[10px] font-bold">スケジュール</span>
        </button>
        <div class="relative -top-5">
          <button class="w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/40 active:scale-95 transition-transform" onclick="showQuickAdd()">
            <span class="material-symbols-outlined text-3xl">add</span>
          </button>
        </div>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="customers" onclick="showPage('customers')">
          <span class="material-symbols-outlined">group</span>
          <span class="text-[10px] font-bold">顧客リスト</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="settings" onclick="showPage('settings')">
          <span class="material-symbols-outlined">settings</span>
          <span class="text-[10px] font-bold">設定</span>
        </button>
      </nav>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<!-- Modal -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
/* ===== CONFIG ===== */
const API_BASE = 'https://4n1y1vgmbl.execute-api.ap-southeast-1.amazonaws.com';

/* ===== STATE ===== */
let authToken = null;
let currentUser = null; // {ownerId, email}
let cachedReservations = [];
let cachedCustomers = [];
let cachedBusinessHours = [];
let cachedClosedDays = [];

/* ===== API HELPER ===== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API_BASE + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    const msg = data?.message || data?.error || 'API Error ' + res.status;
    throw new Error(msg);
  }
  return data;
}

/* ===== UTILS ===== */
const TODAY = new Date();
const YEAR = TODAY.getFullYear(), MONTH = TODAY.getMonth(), DAY = TODAY.getDate();

function fmtDate(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}
function fmtTime(iso) {
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDateTime(iso) { return fmtDate(iso) + ' ' + fmtTime(iso); }
function isoDate(y, m, d) {
  const dt = new Date(y, m, d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function dateKey(d) { return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function statusLabel(s) {
  return s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : s === 'completed' ? '完了' : s;
}
const DAY_MAP = { MONDAY:'月', TUESDAY:'火', WEDNESDAY:'水', THURSDAY:'木', FRIDAY:'金', SATURDAY:'土', SUNDAY:'日' };
const DAY_KEYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

function switchView(v) {
  document.querySelectorAll('.top-tab button').forEach(b => b.classList.remove('active'));
  event.target.closest('button').classList.add('active');
  document.getElementById('customerView').classList.toggle('hidden', v !== 'customer');
  document.getElementById('ownerView').classList.toggle('hidden', v !== 'owner');

  if (v === 'customer') {
    const iframe = document.getElementById('customerIframe');
    const loginMsg = document.getElementById('customerLoginMsg');
    if (!authToken || !currentUser) {
      iframe.style.display = 'none';
      loginMsg.style.display = 'flex';
      return;
    }
    iframe.style.display = 'block';
    loginMsg.style.display = 'none';
    const iframeSrc = 'liff.html?mock=1&ownerId=' + encodeURIComponent(currentUser.ownerId) + '&page=book';
    if (!iframe.src || !iframe.src.includes('liff.html')) {
      iframe.src = iframeSrc;
    }
    window.addEventListener('message', function handler(event) {
      if (event.data && event.data.type === 'liff-ready') {
        window.removeEventListener('message', handler);
        iframe.contentWindow.postMessage({
          type: 'mock-auth',
          token: authToken,
          ownerId: currentUser.ownerId,
          displayName: currentUser.email || 'テストユーザー'
        }, '*');
      }
    });
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

let _loadingEl = null;
function showLoading() {
  if (_loadingEl) return;
  _loadingEl = document.createElement('div');
  _loadingEl.className = 'loading-overlay';
  _loadingEl.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(_loadingEl);
}
function hideLoading() {
  if (_loadingEl) { _loadingEl.remove(); _loadingEl = null; }
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}
function closeModal() { document.getElementById('modalBg').style.display = 'none'; }
document.getElementById('modalBg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

/* ========================================= */
/* ===== OWNER SIDE — LIVE API          ===== */
/* ========================================= */

/* --- Login --- */
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  btn.textContent = 'ログイン中...';
  btn.disabled = true;

  try {
    const res = await api('POST', '/api/auth/login', { email, password });
    authToken = res.token;
    // Decode user info via verify
    const user = await api('POST', '/api/auth/verify');
    currentUser = { ownerId: user.ownerId, email: user.email || email };
  } catch (e) {
    // If verify fails, still proceed with login token
    if (!authToken) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'ログイン';
      btn.disabled = false;
      return;
    }
    currentUser = { ownerId: '', email };
  }

  localStorage.setItem('covalt_token', authToken);
  localStorage.setItem('covalt_user', JSON.stringify(currentUser));
  document.getElementById('tabletLogin').style.display = 'none';
  document.getElementById('tabletApp').style.display = 'flex';
  document.getElementById('userEmail').textContent = currentUser.email;
  btn.textContent = 'ログイン';
  btn.disabled = false;
  showPage('dashboard');
}

async function doLogout() {
  try { await api('POST', '/api/auth/logout'); } catch(e) {}
  authToken = null;
  currentUser = null;
  localStorage.removeItem('covalt_token');
  localStorage.removeItem('covalt_user');
  document.getElementById('tabletApp').style.display = 'none';
  document.getElementById('tabletLogin').style.display = 'flex';
  showToast('ログアウトしました');
}

/* --- Navigation --- */
function showPage(page) {
  document.querySelectorAll('#tabNav button[data-page]').forEach(b => {
    const active = b.dataset.page === page;
    b.classList.toggle('text-primary', active);
    b.classList.toggle('text-slate-400', !active);
    const icon = b.querySelector('.material-symbols-outlined');
    if (icon) icon.style.fontVariationSettings = active ? "'FILL' 1" : "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";
  });
  document.getElementById('tabBody').scrollTop = 0;
  const mc = document.getElementById('mainContent');
  if (page === 'dashboard') renderDashboard(mc);
  else if (page === 'schedule') renderSchedule(mc);
  else if (page === 'customers') renderCustomers(mc);
  else if (page === 'settings') renderSettings(mc);
}

function showQuickAdd() {
  showModal('<h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">クイックアクション</h3>'
    + '<div style="display:flex;flex-direction:column;gap:10px;">'
    + '<button style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;text-align:left;" onclick="closeModal();showPage(\'schedule\')"><span class="material-symbols-outlined" style="color:#ec5b13;">calendar_month</span><span style="font-size:14px;font-weight:600;color:#334155;">スロット管理</span></button>'
    + '<button style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;text-align:left;" onclick="closeModal();openNewCustomer()"><span class="material-symbols-outlined" style="color:#ec5b13;">person_add</span><span style="font-size:14px;font-weight:600;color:#334155;">新規顧客登録</span></button>'
    + '</div>');
}

/* --- Dashboard --- */
let viewMode = 'calendar';
let ocMonth = MONTH, ocYear = YEAR;

async function renderDashboard(mc) {
  mc.innerHTML = '<div class="loading">読み込み中...</div>';

  // Determine date range based on view
  let startDate, endDate;
  if (viewMode === 'day') {
    startDate = isoDate(YEAR, MONTH, DAY);
    endDate = isoDate(YEAR, MONTH, DAY + 1);
  } else if (viewMode === 'week') {
    const dow = TODAY.getDay();
    const ws = new Date(YEAR, MONTH, DAY - dow);
    const we = new Date(YEAR, MONTH, DAY + (6 - dow));
    startDate = isoDate(ws.getFullYear(), ws.getMonth(), ws.getDate());
    endDate = isoDate(we.getFullYear(), we.getMonth(), we.getDate() + 1);
  } else {
    startDate = isoDate(ocYear, ocMonth, 1);
    const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
    endDate = isoDate(ocYear, ocMonth, lastDay + 1);
  }

  try {
    const data = await api('GET', '/api/owner/reservations?startDate=' + startDate + '&endDate=' + endDate);
    cachedReservations = data.reservations || [];
  } catch (e) {
    cachedReservations = [];
    showToast('予約取得エラー: ' + e.message, true);
  }

  let h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
  h += '<h1 style="font-size:18px;font-weight:700;color:#1e293b;">予約一覧 <span style="font-size:13px;font-weight:400;color:#94a3b8;">(' + cachedReservations.length + '件)</span></h1>';
  h += '</div>';
  h += '<div style="display:flex;gap:6px;margin-bottom:16px;">';
  ['day','week','month','calendar'].forEach(v => {
    const label = {day:'日', week:'週', month:'月', calendar:'カレンダー'}[v];
    const active = viewMode === v;
    h += '<button style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;' + (active ? 'background:#ec5b13;color:#fff;' : 'background:#fff;color:#64748b;border:1px solid #e2e8f0;') + '" onclick="viewMode=\'' + v + '\';renderDashboard(document.getElementById(\'mainContent\'))">' + label + '</button>';
  });
  h += '</div>';

  if (viewMode === 'calendar') {
    h += renderOwnerCalendar();
  } else {
    const sorted = [...cachedReservations].sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
    h += '<div style="background:#fff;border-radius:12px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="border-bottom:2px solid #f1f5f9;">';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">予約ID</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">日時</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">顧客名</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">ステータス</th>';
    h += '</tr></thead><tbody>';
    if (!sorted.length) {
      h += '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:40px 0;font-size:13px;">予約はありません</td></tr>';
    } else {
      sorted.forEach(r => {
        const shortId = r.reservationId.substring(0, 8);
        const badgeStyle = r.status === 'confirmed' ? 'background:rgba(236,91,19,.1);color:#ec5b13;' : r.status === 'cancelled' ? 'background:rgba(220,38,38,.08);color:#dc2626;' : 'background:#f1f5f9;color:#64748b;';
        h += '<tr style="cursor:pointer;border-bottom:1px solid #f8fafc;" onmouseover="this.style.background=\'rgba(236,91,19,.03)\'" onmouseout="this.style.background=\'\'" onclick="showReservationDetail(\'' + r.reservationId + '\')">';
        h += '<td style="padding:12px 14px;font-size:12px;color:#94a3b8;">' + shortId + '...</td>';
        h += '<td style="padding:12px 14px;color:#334155;">' + fmtDateTime(r.dateTime) + '</td>';
        h += '<td style="padding:12px 14px;font-weight:600;color:#1e293b;">' + (r.customerName || '-') + '</td>';
        h += '<td style="padding:12px 14px;"><span style="font-size:11px;padding:3px 10px;border-radius:9999px;font-weight:700;' + badgeStyle + '">' + statusLabel(r.status) + '</span></td>';
        h += '</tr>';
      });
    }
    h += '</tbody></table></div>';
  }
  mc.innerHTML = h;
}

function renderOwnerCalendar() {
  const first = new Date(ocYear, ocMonth, 1);
  const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(ocYear, ocMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<h2 style="font-size:16px;font-weight:700;color:#1e293b;">' + ocYear + '年 ' + (ocMonth+1) + '月</h2>';
  h += '<div style="display:flex;gap:8px;">';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="ocMonth--;if(ocMonth<0){ocMonth=11;ocYear--;}renderDashboard(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_left</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="ocMonth++;if(ocMonth>11){ocMonth=0;ocYear++;}renderDashboard(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="renderDashboard(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">refresh</span></button>';
  h += '</div></div>';
  h += '<div class="ow-grid">';
  dows.forEach(d => h += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;padding:6px 0;">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(ocYear, ocMonth, d);
    const isToday = d === DAY && ocMonth === MONTH && ocYear === YEAR;
    let cls = 'ow-cal-cell';
    if (isToday) cls += ' ow-today';
    h += '<div class="' + cls + '"><div class="ow-num">' + d + '</div>';

    const dayRsvs = cachedReservations.filter(r => {
      if (r.status === 'cancelled') return false;
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === ocYear && rd.getMonth() === ocMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    dayRsvs.forEach(r => {
      h += '<div class="ow-evt ow-' + r.status + '" onclick="event.stopPropagation();showReservationDetail(\'' + r.reservationId + '\')" title="' + fmtTime(r.dateTime) + ' ' + (r.customerName || '') + '">';
      h += fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4);
      h += '</div>';
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

    h += '<th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">種別</th>';
    h += '<th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">日時</th>';
    h += '<th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">操作者</th>';
    h += '</tr></thead><tbody>';

      h += '<tr style="border-bottom:1px solid #f8fafc;"><td style="padding:8px 10px;color:#475569;">' + hi.changeType + '</td><td style="padding:8px 10px;color:#475569;">' + fmtDateTime(hi.changedAt) + '</td><td style="padding:8px 10px;color:#475569;">' + hi.changedBy + '</td></tr>';

var _rsvExtrasCustomerId = null;
var _rsvExtrasDateTime = null;

async function loadReservationExtras(customerId, dateTime) {
  _rsvExtrasCustomerId = customerId;
  _rsvExtrasDateTime = dateTime;
  const container = document.getElementById('rsvDetailExtras');
  if (!container) return;
  const dt = new Date(dateTime);
  const rsvDateKey = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  try {
    const [notesData, attachData] = await Promise.all([
      api('GET', '/api/customers/' + customerId + '/notes').catch(() => ({ notes: [] })),
      api('GET', '/api/customers/' + customerId + '/attachments').catch(() => ({ attachments: [] })),
    ]);
    const allNotes = notesData.notes || [];
    const allPhotos = (attachData.attachments || []).filter(a => a.category === 'photo');
    const matchRecords = allNotes.filter(n => n.category === 'record' && n.createdAt && n.createdAt.substring(0,10) === rsvDateKey);
    const matchMemos = allNotes.filter(n => n.category === 'note' && n.createdAt && n.createdAt.substring(0,10) === rsvDateKey);
    const matchPhotos = allPhotos.filter(a => a.createdAt && a.createdAt.substring(0,10) === rsvDateKey);

    const cardStyle = 'background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:12px;';
    const addBtnStyle = 'display:flex;align-items:center;gap:4px;border:1px dashed #ec5b13;background:none;color:#ec5b13;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;';
    let h = '';

    // Records
    h += '<div style="' + cardStyle + '">';
    h += '<h3 style="font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;color:#ec5b13;">description</span> 施術記録' + (matchRecords.length ? '（' + matchRecords.length + '件）' : '') + '</h3>';
    if (!matchRecords.length) {
      h += '<p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">この日の施術記録はありません</p>';
    } else {
      matchRecords.forEach(n => {
        h += '<div style="padding:8px 0;border-bottom:1px solid #f8fafc;">';
        h += '<div style="font-size:13px;font-weight:600;color:#334155;">' + esc(n.title || '無題') + '</div>';
        h += '<div id="rsvNote_' + n.noteId + '" style="display:none;margin-top:6px;font-size:12px;color:#64748b;white-space:pre-wrap;line-height:1.6;"></div>';
        h += '<button style="border:none;background:none;color:#ec5b13;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;" onclick="toggleRsvNote(\'' + customerId + '\',\'' + n.noteId + '\')">内容を表示</button>';
        h += '</div>';
      });
    }
    h += '<button style="' + addBtnStyle + '" onclick="openRsvNewNote(\'' + customerId + '\',\'record\')"><span class="material-symbols-outlined" style="font-size:14px;">add</span>施術記録を追加</button>';
    h += '</div>';

    // Memos
    h += '<div style="' + cardStyle + '">';
    h += '<h3 style="font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;color:#ec5b13;">sticky_note_2</span> メモ' + (matchMemos.length ? '（' + matchMemos.length + '件）' : '') + '</h3>';
    if (!matchMemos.length) {
      h += '<p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">この日のメモはありません</p>';
    } else {
      matchMemos.forEach(n => {
        h += '<div style="padding:8px 0;border-bottom:1px solid #f8fafc;">';
        h += '<div style="font-size:13px;font-weight:600;color:#334155;">' + esc(n.title || '無題') + '</div>';
        h += '<div id="rsvNote_' + n.noteId + '" style="display:none;margin-top:6px;font-size:12px;color:#64748b;white-space:pre-wrap;line-height:1.6;"></div>';
        h += '<button style="border:none;background:none;color:#ec5b13;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;" onclick="toggleRsvNote(\'' + customerId + '\',\'' + n.noteId + '\')">内容を表示</button>';
        h += '</div>';
      });
    }
    h += '<button style="' + addBtnStyle + '" onclick="openRsvNewNote(\'' + customerId + '\',\'note\')"><span class="material-symbols-outlined" style="font-size:14px;">add</span>メモを追加</button>';
    h += '</div>';

    // Photos
    h += '<div style="' + cardStyle + '">';
    h += '<h3 style="font-size:13px;font-weight:700;color:#475569;margin-bottom:10px;"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;color:#ec5b13;">photo_library</span> 写真' + (matchPhotos.length ? '（' + matchPhotos.length + '件）' : '') + '</h3>';
    if (!matchPhotos.length) {
      h += '<p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">この日の写真はありません</p>';
    } else {
      h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">';
      matchPhotos.forEach(a => {
        var pDate = a.createdAt ? new Date(a.createdAt) : null;
        var pDateStr = pDate ? (pDate.getMonth()+1) + '/' + pDate.getDate() : '';
        h += '<div style="border-radius:8px;overflow:hidden;background:#f1f5f9;">';
        h += '<div style="aspect-ratio:1;"><img id="rsvPhoto_' + a.attachmentId + '" style="width:100%;height:100%;object-fit:cover;" src="" alt="' + esc(a.fileName) + '"></div>';
        if (pDateStr) h += '<div style="padding:3px 0;text-align:center;font-size:10px;color:#94a3b8;background:#fff;">' + pDateStr + '</div>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '<label style="' + addBtnStyle + 'display:inline-flex;"><span class="material-symbols-outlined" style="font-size:14px;">add_photo_alternate</span>写真を追加<input type="file" accept="image/*" multiple style="display:none;" onchange="uploadRsvPhoto(\'' + customerId + '\', this)"></label>';
    h += '</div>';

    container.innerHTML = h;

    // Load presigned URLs for photos
    if (matchPhotos.length) {
      matchPhotos.forEach(a => {
        api('GET', '/api/customers/' + customerId + '/attachments/' + a.attachmentId + '/url')
          .then(res => { const img = document.getElementById('rsvPhoto_' + a.attachmentId); if (img) img.src = res.presignedUrl; })
          .catch(() => {});
      });
    }
  } catch (e) {
    container.innerHTML = '<p style="text-align:center;color:#dc2626;padding:16px 0;font-size:13px;">記録の取得に失敗しました</p>';
  }
}

function openRsvNewNote(customerId, category) {
  const catLabel = category === 'record' ? '施術記録' : 'メモ';
  const html = '<h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">新規' + catLabel + '</h3>'
    + '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">タイトル</label><input class="ow-input" id="rsvNewNoteTitle" placeholder="タイトル"></div>'
    + '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">内容</label><textarea class="ow-input" id="rsvNewNoteContent" rows="6" style="resize:vertical;" placeholder="内容を入力..."></textarea></div>'
    + '<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;background:#ec5b13;" onclick="doCreateRsvNote(\'' + customerId + '\',\'' + category + '\')">保存</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">キャンセル</button></div>';
  showModal(html);
}

async function doCreateRsvNote(customerId, category) {
  const title = document.getElementById('rsvNewNoteTitle').value;
  const content = document.getElementById('rsvNewNoteContent').value;
  if (!content) { showToast('内容を入力してください', true); return; }
  showLoading();
  try {
    await api('POST', '/api/customers/' + customerId + '/notes', { category: category, title: title, content: content });
    closeModal();
    showToast('保存しました');
    loadReservationExtras(_rsvExtrasCustomerId, _rsvExtrasDateTime);
  } catch (e) {
    showToast('保存エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

async function uploadRsvPhoto(customerId, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  showLoading();
  try {
    for (const file of files) {
      const res = await api('POST', '/api/customers/' + customerId + '/attachments/presigned-url', {
        fileName: file.name, fileType: file.type, category: 'photo'
      });
      await fetch(res.presignedUrl, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });
    }
    showToast(files.length + '枚の写真をアップロードしました');
    await new Promise(r => setTimeout(r, 500));
    await loadReservationExtras(_rsvExtrasCustomerId, _rsvExtrasDateTime);
  } catch (e) {
    showToast('アップロードエラー: ' + e.message, true);
  } finally { hideLoading(); }
}

function confirmCancelReservation(id) {
  showModal('<h3>予約をキャンセルしますか？</h3><p style="font-size:13px;color:#666;margin-bottom:16px;">この操作は元に戻せません。</p><div style="display:flex;gap:8px;"><button class="btn btn-danger" style="flex:1;" onclick="cancelReservation(\'' + id + '\')">キャンセル実行</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">戻る</button></div>');
}

async function cancelReservation(id) {
  closeModal();
  showLoading();
  try {
    await api('PUT', '/api/owner/reservations/' + id + '/cancel');
    hideLoading();
    showToast('予約をキャンセルしました');
    showPage('dashboard');

    hideLoading();
    showToast('キャンセルエラー: ' + e.message, true);

async function completeReservation(id) {

    showToast('完了エラー: ' + e.message, true);

}

/* --- Schedule --- */
let schMonth = MONTH, schYear = YEAR;
let schSelectedDate = null;
let schReservations = [];
let schSlotSummary = {};
let cachedTemplates = [];

async function renderSchedule(mc) {
  mc.innerHTML = '<div class="loading">読み込み中...</div>';

  try {
    const startD = isoDate(schYear, schMonth, 1);
    const endD = isoDate(schYear, schMonth + 1, 0);
    const [bhRes, cdRes, rsvRes, slotRes, tplRes] = await Promise.all([
      api('GET', '/api/schedule/business-hours'),
      api('GET', '/api/schedule/closed-days'),
      api('GET', '/api/owner/reservations?startDate=' + startD + '&endDate=' + isoDate(schYear, schMonth + 1, 1)),
      api('GET', '/api/schedule/slots/summary?startDate=' + startD + '&endDate=' + endD),
      api('GET', '/api/schedule/templates'),
    ]);
    cachedBusinessHours = bhRes.businessHours || [];
    cachedClosedDays = cdRes.closedDays || [];
    schReservations = rsvRes.reservations || [];
    schSlotSummary = slotRes.days || {};

  } catch (e) {
    showToast('スケジュール取得エラー: ' + e.message, true);
  }

  const _card = 'background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;';

  const _btnPrimary = 'padding:6px 16px;background:#ec5b13;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;';
  const _btnOutline = 'padding:6px 16px;background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;';
  const _btnDanger = 'padding:4px 10px;background:none;border:1px solid #f87171;color:#f87171;border-radius:6px;font-size:10px;cursor:pointer;';
  const _inp = 'padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;';

  let h = '<h1 style="font-size:18px;font-weight:700;color:#1e293b;margin-bottom:16px;">スケジュール設定</h1>';

  h += renderScheduleCalendar();
  h += '<div id="schDayDetail"></div>';

  // --- Business hours ---
  h += '<div style="' + _card + '"><h3 style="' + _secTitle + '"><span class="material-symbols-outlined" style="font-size:18px;vertical-align:text-bottom;color:#ec5b13;margin-right:6px;">schedule</span>営業時間</h3>';
  DAY_KEYS.forEach(dk => {
    const bh = cachedBusinessHours.find(b => b.dayOfWeek === dk);
    const isOpen = bh ? bh.isBusinessDay : true;
    const start = bh?.startTime || '10:00';
    const end = bh?.endTime || '18:00';

function renderScheduleCalendar() {
  const first = new Date(schYear, schMonth, 1);
  const lastDay = new Date(schYear, schMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(schYear, schMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<h2 style="font-size:16px;font-weight:700;color:#1e293b;">' + schYear + '年 ' + (schMonth+1) + '月</h2>';
  h += '<div style="display:flex;gap:8px;">';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="schMonth--;if(schMonth<0){schMonth=11;schYear--;}renderSchedule(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_left</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="schMonth++;if(schMonth>11){schMonth=0;schYear++;}renderSchedule(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="renderSchedule(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">refresh</span></button>';
  h += '</div></div>';
  h += '<div class="ow-grid">';
  dows.forEach(d => h += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;padding:6px 0;">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(schYear, schMonth, d);
    const iso = isoDate(schYear, schMonth, d);
    const isToday = d === DAY && schMonth === MONTH && schYear === YEAR;
    const isClosed = closedSet.has(iso);
    const isSel = schSelectedDate === iso;
    const jsDay = dt.getDay();
    const dayKeyMap = [null,'MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];
    const dayEnum = dayKeyMap[jsDay === 0 ? 7 : jsDay];
    const bh = cachedBusinessHours.find(b => b.dayOfWeek === dayEnum);
    const isRegularClosed = bh && !bh.isBusinessDay;

    let cls = 'ow-cal-cell';
    if (isToday) cls += ' ow-today';
    if (isClosed || isRegularClosed) cls += ' ow-holiday';
    const selStyle = isSel ? 'outline:2px solid #ec5b13;outline-offset:-2px;background:rgba(236,91,19,.06);' : '';

    h += '<div class="' + cls + '" style="' + selStyle + '" onclick="selectSchDay(\'' + iso + '\')">';
    h += '<div class="ow-num">' + d + '</div>';

    const slotInfo = schSlotSummary[iso];
    const availSlots = slotInfo ? (slotInfo.availableSlots || []) : [];
    const dayRsvs = schReservations.filter(r => {
      if (r.status === 'cancelled') return false;
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === schYear && rd.getMonth() === schMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    const events = [];
    availSlots.forEach(s => {
      events.push({ time: s.startTime, type: 'available', label: s.startTime + ' 空き' });
    });
    dayRsvs.forEach(r => {
      events.push({ time: fmtTime(r.dateTime), type: r.status, label: fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4), rsvId: r.reservationId });
    });
    events.sort((a, b) => a.time.localeCompare(b.time));

    events.forEach(ev => {
      if (ev.type === 'available') {
        h += '<div class="ow-evt ow-available" title="' + ev.label + '">' + ev.label + '</div>';
      } else {
        h += '<div class="ow-evt ow-' + ev.type + '" onclick="event.stopPropagation();showReservationDetail(\'' + ev.rsvId + '\')" title="' + ev.label + '">' + ev.label + '</div>';
      }
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

function selectSchDay(iso) {
  schSelectedDate = iso;
  // Re-highlight selected day (update outline via re-render would be heavy, just load slots)
  loadDaySlots(iso);
}

async function loadDaySlots(dateStr) {
  const el = document.getElementById('schDayDetail');
  if (!el) return;
  el.innerHTML = '<div class="o-card"><div class="loading">スロット読み込み中...</div></div>';

  let slots = [];
  let dayRsvs = [];
  let isHoliday = false;
  try {
    // Fetch slots and reservations for this day in parallel
    const [y, m, d] = dateStr.split('-').map(Number);
    const nextDateStr = isoDate(y, m - 1, d + 1);
    const [slotRes, rsvRes] = await Promise.all([
      api('GET', '/api/schedule/slots/date/' + dateStr),
      api('GET', '/api/owner/reservations?startDate=' + dateStr + '&endDate=' + nextDateStr),
    ]);
    slots = slotRes.slots || [];
    dayRsvs = (rsvRes.reservations || []).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
  } catch (e) {
    // fallback
  }
  // Check holiday via closed days cache
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));
  isHoliday = closedSet.has(dateStr);

  const d = new Date(dateStr + 'T00:00:00');
  const dayLabel = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
  const dowNames = ['日','月','火','水','木','金','土'];

  const _inp2 = 'padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;outline:none;';

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';

  h += '</div>';

  if (isHoliday) {
    h += '<p style="color:#dc2626;font-size:13px;font-weight:600;"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:text-bottom;">event_busy</span> 休業日</p>';
  } else if (slots.length === 0) {
    h += '<p style="color:#94a3b8;font-size:13px;">スロットがありません。下の「一括生成」で作成してください。</p>';
  } else {
    const rsvByRsvId = {};
    dayRsvs.forEach(r => { rsvByRsvId[r.reservationId] = r; });

    h += '<div style="display:flex;flex-direction:column;gap:8px;">';
    slots.sort((a, b) => a.startTime.localeCompare(b.startTime)).forEach(s => {
      const isBooked = s.status === 'booked';

        // Reserved slot - card style from UI sample
        h += '<div style="display:flex;align-items:center;gap:12px;background:#fff;padding:14px;border-radius:12px;border:1px solid rgba(236,91,19,.08);box-shadow:0 1px 2px rgba(0,0,0,.03);">';
        h += '<div style="width:60px;text-align:center;border-right:1px solid #f1f5f9;padding-right:12px;">';
        h += '<p style="font-size:14px;font-weight:700;color:#1e293b;">' + s.startTime + '</p>';

        h += '</div>';
        h += '<div style="flex:1;">';
        h += '<h4 style="font-size:13px;font-weight:700;color:#1e293b;">' + (r ? (r.customerName || '') + ' 様' : '') + '</h4>';

        if (r) h += '<button style="color:#cbd5e1;background:none;border:none;cursor:pointer;" onclick="showReservationDetail(\'' + r.reservationId + '\')"><span class="material-symbols-outlined">more_vert</span></button>';

      } else {
        // Available slot - dashed border style from UI sample

        h += '<div style="width:60px;text-align:center;border-right:1px solid #f1f5f9;padding-right:12px;">';
        h += '<p style="font-size:14px;font-weight:700;color:#1e293b;">' + s.startTime + '</p>';
        if (durMin) h += '<p style="font-size:10px;color:#94a3b8;">' + durMin + 'min</p>';

        h += '</div>';

  h += '<select id="quickGenBuf" style="' + _inp2 + '"><option value="0">バッファなし</option><option value="5">5分</option><option value="10">10分</option><option value="15">15分</option><option value="30">30分</option></select>';
  h += '</div>';
  h += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">';
  h += '<input type="time" id="quickSingleStart" value="09:00" style="' + _inp2 + 'width:90px;">';
  h += '<span style="font-size:11px;color:#94a3b8;">〜</span>';
  h += '<input type="time" id="quickSingleEnd" value="10:00" style="' + _inp2 + 'width:90px;">';
  h += '<button style="padding:6px 14px;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;" onclick="quickAddSlot(\'' + dateStr + '\')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:text-bottom;">add</span> 1枠追加</button>';

  if (cachedTemplates.length > 0) {

    h += '<select id="quickTpl" style="' + _inp2 + '">';

      h += '<option value="' + tpl.templateId + '">' + tpl.name + ' (' + tpl.entries.length + '枠)</option>';
    });
    h += '</select>';

  }

  h += '</div>';

async function quickGenSlots(dateStr) {
  const dur = +document.getElementById('quickGenDur').value;
  const buf = +document.getElementById('quickGenBuf').value;
  showLoading();
  try {
    const res = await api('POST', '/api/schedule/slots/generate', { date: dateStr, durationMinutes: dur, bufferMinutes: buf });
    showToast(res.generatedCount + '件のスロットを生成しました');
    loadDaySlots(dateStr);
  } catch (e) {
    showToast('生成エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

async function quickApplyTemplate(dateStr) {
  const templateId = document.getElementById('quickTpl').value;
  if (!templateId) { showToast('テンプレートを選択してください', true); return; }
  showLoading();
  try {
    const res = await api('POST', '/api/schedule/templates/' + templateId + '/apply', { date: dateStr, clearExisting: true });
    hideLoading();
    var msg = res.totalSlotsAdded + '枠を追加しました';
    if (res.totalSkipped > 0) msg += '（' + res.totalSkipped + '枠は既存予約と重複のためスキップ）';
    showToast(msg);
    renderSchedule(document.getElementById('mainContent'));
    setTimeout(() => { schSelectedDate = dateStr; loadDaySlots(dateStr); }, 100);
  } catch (e) {
    hideLoading();
    showToast('適用エラー: ' + e.message, true);
  }
}

async function quickAddSlot(dateStr) {
  const startTime = document.getElementById('quickSingleStart').value;
  const endTime = document.getElementById('quickSingleEnd').value;
  if (!startTime || !endTime) { showToast('時間を指定してください', true); return; }
  showLoading();
  try {
    await api('POST', '/api/schedule/slots', { date: dateStr, startTime, endTime });
    showToast('スロットを追加しました');
    loadDaySlots(dateStr);
  } catch (e) {
    showToast('追加エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

var _tplEditorEntries = [];
var _tplEditingId = null;

function openTemplateEditor(templateId) {
  _tplEditingId = templateId || null;
  _tplEditorEntries = [];
  var title = '新規テンプレート作成';
  var nameVal = '';

  if (_tplEditingId) {
    var tpl = cachedTemplates.find(t => t.templateId === _tplEditingId);
    if (tpl) {
      title = 'テンプレート編集';
      nameVal = tpl.name;
      _tplEditorEntries = tpl.entries.map(e => ({ start: e.startTime.substring(0,5), end: e.endTime.substring(0,5) }));
    }
  }

function renderTplEntryList() {
  var el = document.getElementById('tplEntryList');
  if (!el) return;
  if (!_tplEditorEntries.length) {
    el.innerHTML = '<p style="font-size:12px;color:#94a3b8;padding:8px 0;">スロットがありません。下のフォームから追加してください。</p>';
    return;
  }
  var h = '<div style="display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;">';
  _tplEditorEntries.sort((a,b) => a.start.localeCompare(b.start));
  _tplEditorEntries.forEach((e, i) => {
    h += '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;">';
    h += '<span class="material-symbols-outlined" style="font-size:14px;color:#ec5b13;">schedule</span>';
    h += '<span style="font-weight:600;color:#334155;">' + e.start + '</span>';
    h += '<span style="color:#94a3b8;">〜</span>';
    h += '<span style="font-weight:600;color:#334155;">' + e.end + '</span>';
    var durMin = (parseInt(e.end.split(':')[0])*60+parseInt(e.end.split(':')[1])) - (parseInt(e.start.split(':')[0])*60+parseInt(e.start.split(':')[1]));
    h += '<span style="font-size:10px;color:#94a3b8;margin-left:4px;">(' + durMin + '分)</span>';
    h += '<span style="flex:1;"></span>';
    h += '<button style="background:none;border:none;color:#dc2626;cursor:pointer;padding:2px;" onclick="removeTplEntry(' + i + ')"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>';
    h += '</div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function addTplEntry() {
  var s = document.getElementById('tplNewStart').value;
  var e = document.getElementById('tplNewEnd').value;
  if (!s || !e) { showToast('開始・終了時刻を入力してください', true); return; }
  if (s >= e) { showToast('終了時刻は開始時刻より後にしてください', true); return; }
  _tplEditorEntries.push({ start: s, end: e });
  renderTplEntryList();
  // Advance start/end for next entry
  document.getElementById('tplNewStart').value = e;
  var endMin = parseInt(e.split(':')[0])*60 + parseInt(e.split(':')[1]);
  var dur = endMin - (parseInt(s.split(':')[0])*60 + parseInt(s.split(':')[1]));
  var nextEnd = endMin + dur;
  document.getElementById('tplNewEnd').value = String(Math.floor(nextEnd/60)).padStart(2,'0') + ':' + String(nextEnd%60).padStart(2,'0');
}

function removeTplEntry(idx) {
  _tplEditorEntries.splice(idx, 1);
  renderTplEntryList();
}

function bulkGenTplEntries() {
  var s = document.getElementById('tplBulkStart').value;
  var e = document.getElementById('tplBulkEnd').value;
  var dur = parseInt(document.getElementById('tplBulkDur').value);
  if (!s || !e || !dur || dur < 5) { showToast('値を正しく入力してください', true); return; }
  _tplEditorEntries = [];
  var cur = parseInt(s.split(':')[0])*60 + parseInt(s.split(':')[1]);
  var endM = parseInt(e.split(':')[0])*60 + parseInt(e.split(':')[1]);
  while (cur + dur <= endM) {
    _tplEditorEntries.push({
      start: String(Math.floor(cur/60)).padStart(2,'0') + ':' + String(cur%60).padStart(2,'0'),
      end: String(Math.floor((cur+dur)/60)).padStart(2,'0') + ':' + String((cur+dur)%60).padStart(2,'0')
    });
    cur += dur;
  }
  renderTplEntryList();
}

async function saveTplFromEditor() {
  var name = document.getElementById('tplEditorName').value.trim();
  if (!name) { showToast('テンプレート名を入力してください', true); return; }
  if (!_tplEditorEntries.length) { showToast('スロットを1つ以上追加してください', true); return; }
  var entries = _tplEditorEntries.map(e => ({ startTime: e.start, endTime: e.end }));
  showLoading();
  try {
    if (_tplEditingId) {
      await api('DELETE', '/api/schedule/templates/' + _tplEditingId);
    }
    await api('POST', '/api/schedule/templates', { name: name, entries: entries });
    closeModal();
    hideLoading();
    showToast(_tplEditingId ? 'テンプレートを更新しました' : 'テンプレートを保存しました');
    renderSchedule(document.getElementById('mainContent'));
  } catch (e) {
    hideLoading();
    showToast('保存エラー: ' + e.message, true);
  }
}

          const catLabel = n.category === 'record' ? '施術記録' : 'メモ';
          const catBg = n.category === 'record' ? 'rgba(236,91,19,.1)' : 'rgba(139,92,246,.1)';
          const catCol = n.category === 'record' ? '#ec5b13' : '#8b5cf6';
          h += '<div style="border:1px solid #f1f5f9;border-radius:10px;padding:12px;margin-bottom:8px;">';
          h += '<div style="display:flex;justify-content:space-between;align-items:center;">';
          h += '<div><span style="background:' + catBg + ';color:' + catCol + ';font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;">' + catLabel + '</span> ';
          h += '<span style="font-size:13px;font-weight:700;margin-left:6px;color:#1e293b;">' + esc(n.title || '無題') + '</span></div>';
          h += '<span style="font-size:10px;color:#94a3b8;">' + fmtDate(n.createdAt) + '</span></div>';
          h += '<div id="noteBody_' + n.noteId + '" style="display:none;margin-top:10px;padding:10px;background:#f8fafc;border-radius:8px;font-size:12px;white-space:pre-wrap;color:#475569;"></div>';
          h += '<div style="margin-top:8px;display:flex;gap:8px;">';
          h += '<button style="border:none;background:none;color:#ec5b13;cursor:pointer;font-size:11px;font-weight:600;" onclick="toggleNoteContent(\'' + customerId + '\',\'' + n.noteId + '\')">内容を表示</button>';
          h += '<button style="border:none;background:none;color:#ec5b13;cursor:pointer;font-size:11px;font-weight:600;" onclick="openEditNote(\'' + customerId + '\',\'' + n.noteId + '\',\'' + esc(n.title || '') + '\')">編集</button>';
          h += '<button style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:11px;font-weight:600;" onclick="confirmDeleteNote(\'' + customerId + '\',\'' + n.noteId + '\')">削除</button>';
          h += '</div></div>';
        });
      }
      h += '</div>';
    }

    // --- Photos Tab ---
    if (_custDetailTab === 'photos') {
      h += '<div style="' + _cdCard + '">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
      h += '<h3 style="font-size:14px;font-weight:700;color:#1e293b;">写真 <span style="font-size:11px;font-weight:400;color:#94a3b8;">(' + attachments.length + '件)</span></h3>';
      h += '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;font-weight:700;color:#64748b;cursor:pointer;"><span class="material-symbols-outlined" style="font-size:14px;">add_photo_alternate</span>アップロード<input type="file" accept="image/*" multiple style="display:none;" onchange="uploadPhoto(\'' + customerId + '\', this)"></label>';
      h += '</div>';
      if (!attachments.length) {
        h += '<p style="text-align:center;color:#94a3b8;padding:24px 0;font-size:13px;">写真はありません</p>';
      } else {
        h += '<div id="photoGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">';
        attachments.forEach(a => {
          var photoDate = a.createdAt ? new Date(a.createdAt) : null;
          var photoDateStr = photoDate ? (photoDate.getMonth()+1) + '/' + photoDate.getDate() : '';
          h += '<div style="position:relative;border:1px solid #f1f5f9;border-radius:10px;overflow:hidden;background:#f8fafc;" id="photoWrap_' + a.attachmentId + '">';
          h += '<div style="aspect-ratio:1;"><img id="photoImg_' + a.attachmentId + '" style="width:100%;height:100%;object-fit:cover;" src="" alt="' + esc(a.fileName) + '"></div>';
          if (photoDateStr) h += '<div style="padding:4px 0;text-align:center;font-size:10px;color:#94a3b8;background:#fff;">' + photoDateStr + '</div>';
          h += '<button onclick="confirmDeleteAttachment(\'' + customerId + '\',\'' + a.attachmentId + '\')" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:22px;text-align:center;">&#10005;</button>';
          h += '</div>';
        });
        h += '</div>';
      }
      h += '</div>';
    }

    // --- Reservation History Tab ---
    if (_custDetailTab === 'history') {
      h += '<div style="' + _cdCard + '">';
      h += '<h3 style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:10px;">施術履歴 <span style="font-size:11px;font-weight:400;color:#94a3b8;">(' + reservations.length + '件)</span></h3>';
      if (!reservations.length) {
        h += '<p style="text-align:center;color:#94a3b8;padding:24px 0;font-size:13px;">施術履歴はありません</p>';
      } else {
        h += '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="border-bottom:2px solid #f1f5f9;">';
        h += '<th style="text-align:left;padding:10px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">日時</th>';
        h += '<th style="text-align:left;padding:10px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">ステータス</th>';
        h += '</tr></thead><tbody>';
        reservations.forEach(r => {
          const badgeStyles = { confirmed: 'background:rgba(236,91,19,.1);color:#ec5b13;', completed: 'background:#f1f5f9;color:#64748b;', cancelled: 'background:rgba(220,38,38,.08);color:#dc2626;' };
          const statusLabels = { confirmed: '確定', completed: '完了', cancelled: 'キャンセル' };
          const bStyle = badgeStyles[r.status] || '';
          const label = statusLabels[r.status] || r.status;
          h += '<tr style="cursor:pointer;border-bottom:1px solid #f8fafc;" onmouseover="this.style.background=\'rgba(236,91,19,.03)\'" onmouseout="this.style.background=\'\'" onclick="showReservationDetail(\'' + (r.reservationId || r.id) + '\',\'' + customerId + '\')">'
            + '<td style="padding:10px;color:#334155;">' + fmtDateTime(r.dateTime) + '</td>'
            + '<td style="padding:10px;"><span style="font-size:11px;padding:3px 10px;border-radius:9999px;font-weight:700;' + bStyle + '">' + label + '</span></td></tr>';
        });
        h += '</tbody></table>';
      }
      h += '</div>';
    }

    mc.innerHTML = h;

    // Load photo thumbnails via presigned URLs
    if (_custDetailTab === 'photos' && attachments.length) {
      attachments.forEach(a => {
        api('GET', '/api/customers/' + customerId + '/attachments/' + a.attachmentId + '/url')
          .then(res => {
            const img = document.getElementById('photoImg_' + a.attachmentId);
            if (img) img.src = res.presignedUrl;
          }).catch(() => {});
      });
    }
  } catch (e) {
    hideLoading();
    showToast('顧客詳細の取得に失敗しました: ' + e.message, true);
    renderCustomers(mc);
  }
}

      + '<div class="form-group"><label>生年月日</label><input class="form-input" id="editProfileVal" type="date" value="' + (currentValue || '') + '"></div>'

    html = '<h3>性別の編集</h3>'
      + '<div class="form-group"><label>性別</label><select class="form-input" id="editProfileVal">'
      + '<option value="">未設定</option>'
      + '<option value="male"' + (currentValue === 'male' ? ' selected' : '') + '>男性</option>'

async function saveProfileField(customerId, field) {
  const val = document.getElementById('editProfileVal').value;
  showLoading();
  try {
    const body = {};
    body[field] = val || null;
    await api('PUT', '/api/customers/' + customerId + '/profile', body);
    closeModal();
    showToast('プロフィールを更新しました');
    showCustomerDetail(customerId);
  } catch (e) {
    showToast('更新エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

// --- Notes ---

async function doCreateNote(customerId, category) {
  const title = document.getElementById('newNoteTitle').value;

  showLoading();
  try {
    await api('POST', '/api/customers/' + customerId + '/notes', { category: category, title: title, content: content });
    closeModal();
    showToast('保存しました');
    _custDetailTab = 'notes';
    showCustomerDetail(customerId);
  } catch (e) {
    showToast('保存エラー: ' + e.message, true);

}

async function toggleNoteContent(customerId, noteId) {
  const el = document.getElementById('noteBody_' + noteId);
  if (!el) return;
  if (el.style.display === 'block') {
    el.style.display = 'none';
    return;
  }
  el.innerHTML = '<span style="color:#999;">読み込み中...</span>';
  el.style.display = 'block';
  try {
    const data = await api('GET', '/api/customers/' + customerId + '/notes/' + noteId);
    el.textContent = data.content || '(空)';
  } catch (e) {
    el.innerHTML = '<span style="color:#d32f2f;">取得エラー: ' + esc(e.message) + '</span>';
  }
}

// --- Photos ---
async function uploadPhoto(customerId, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  showLoading();
  try {
    for (const file of files) {
      const res = await api('POST', '/api/customers/' + customerId + '/attachments/presigned-url', {
        fileName: file.name, fileType: file.type, category: 'photo'
      });
      await fetch(res.presignedUrl, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });
    }
    showToast(files.length + '枚の写真をアップロードしました');
    _custDetailTab = 'photos';
    showCustomerDetail(customerId);
  } catch (e) {
    showToast('アップロードエラー: ' + e.message, true);
  } finally { hideLoading(); }
}

  showModal('<h3>写真を削除しますか？</h3><p style="font-size:13px;color:#666;margin-bottom:16px;">この操作は元に戻せません。</p><div style="display:flex;gap:8px;"><button class="btn btn-danger" style="flex:1;" onclick="doDeleteAttachment(\'' + customerId + '\',\'' + attachmentId + '\')">削除</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">キャンセル</button></div>');

  h += '<div style="' + _sRow + '"><dt style="' + _sDt + '">メール</dt><dd style="' + _sDd + '">' + (currentUser?.email || '-') + '</dd></div>';
  h += '<div style="' + _sRow + '"><dt style="' + _sDt + '">オーナーID</dt><dd style="' + _sDd + 'font-size:11px;word-break:break-all;">' + (currentUser?.ownerId || '-') + '</dd></div>';
  h += '</div>';

  h += '<div style="' + _sCard + '"><h3 style="' + _sTitle + '"><span class="material-symbols-outlined" style="font-size:18px;vertical-align:text-bottom;color:#ec5b13;margin-right:6px;">policy</span>キャンセルポリシー</h3>';
  h += '<p style="font-size:12px;color:#64748b;margin-bottom:10px;">顧客がキャンセルする際に表示されるポリシーを設定します。</p>';

  h += '<button style="padding:8px 20px;background:#ec5b13;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;" onclick="saveCancellationPolicy()">保存</button></div>';

  h += '<p style="font-size:12px;color:#64748b;margin-bottom:12px;">LINE Developers Console から取得した情報を設定します。</p>';
  h += '<div style="margin-bottom:12px;"><label style="' + _sLabel + '">チャネルアクセストークン</label><input class="ow-input" id="cfgToken" placeholder="Channel Access Token"></div>';
  h += '<div style="margin-bottom:12px;"><label style="' + _sLabel + '">チャネルシークレット</label><input class="ow-input" id="cfgSecret" placeholder="Channel Secret"></div>';
  h += '<div style="margin-bottom:12px;"><label style="' + _sLabel + '">LIFF ID</label><input class="ow-input" id="cfgLiff" placeholder="LIFF ID"></div>';

  h += '<div style="' + _sCard + '"><h3 style="' + _sTitle + '"><span class="material-symbols-outlined" style="font-size:18px;vertical-align:text-bottom;color:#ec5b13;margin-right:6px;">api</span>API情報</h3>';

async function saveCancellationPolicy() {
  const policy = document.getElementById('cfgCancelPolicy').value;
  showLoading();
  try {
    await api('PUT', '/api/schedule/settings', { cancellationPolicy: policy });
    showToast('キャンセルポリシーを保存しました');
  } catch (e) {
    showToast('保存エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

async function saveLineConfig() {
  const token = document.getElementById('cfgToken').value;
  const secret = document.getElementById('cfgSecret').value;
  const liffId = document.getElementById('cfgLiff').value;
  if (!token || !secret || !liffId) { showToast('全項目を入力してください', true); return; }
  try {
    await api('POST', '/api/line/channel-config', {
      channelAccessToken: token,
      channelSecret: secret,
      liffId: liffId,
      webhookUrl: API_BASE + '/api/line/webhook',
    });
    showToast('LINE設定を保存しました');
  } catch (e) {
    // If already exists, try update
    try {
      await api('PUT', '/api/line/channel-config', {
        channelAccessToken: token,
        channelSecret: secret,
        liffId: liffId,
      });
      showToast('LINE設定を更新しました');
    } catch (e2) {
      showToast('保存エラー: ' + e2.message, true);
    }
  }
}

/* INIT */
(function restoreSession() {
  const savedToken = localStorage.getItem('covalt_token');
  const savedUser = localStorage.getItem('covalt_user');
  if (savedToken && savedUser) {
    authToken = savedToken;
    try { currentUser = JSON.parse(savedUser); } catch(e) { return; }
    // Verify token is still valid
    api('POST', '/api/auth/verify').then(user => {
      currentUser = { ownerId: user.ownerId, email: user.email || currentUser.email };
      localStorage.setItem('covalt_user', JSON.stringify(currentUser));
      document.getElementById('tabletLogin').style.display = 'none';
      document.getElementById('tabletApp').style.display = 'flex';
      document.getElementById('userEmail').textContent = currentUser.email;
      showPage('dashboard');
    }).catch(() => {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('covalt_token');
      localStorage.removeItem('covalt_user');
    });
  }
})();
