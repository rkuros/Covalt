<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768, height=1024, initial-scale=1.0">
<title>Covalt - 予約管理システム</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { "primary": "#ec5b13" },
      fontFamily: { "display": ["Inter"] },
      borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
    },
  },
}
</script>
<style>
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#e8e8e8;color:#333;}

/* === Top Tab === */
.top-tab{display:flex;justify-content:center;gap:0;padding:16px 16px 0;background:#e8e8e8;}
.top-tab button{padding:10px 32px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#ccc;color:#666;border-radius:8px 8px 0 0;}
.top-tab button.active{background:#fff;color:#333;}

/* === Device frames === */
.device-wrap{display:flex;justify-content:center;padding:0 16px 32px;background:#e8e8e8;}
.device-wrap.hidden{display:none;}
.phone{width:375px;height:740px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}
.tablet{width:620px;height:820px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}

/* ==================== */
/* === CUSTOMER SIDE === */
/* ==================== */

/* Customer-side design variables (matching liff.html) */
.phone{--c-primary:#00B4A8;--c-primary-dark:#009688;--c-bg:#F5F7FA;--c-card:#FFF;--c-text:#1A1A2E;--c-sub:#6B7280;--c-border:#E5E7EB;--c-danger:#EF4444;}

/* LINE header */
.line-header{background:#06c755;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.line-header .back{font-size:20px;cursor:pointer;}
.line-header .title{font-size:15px;font-weight:700;flex:1;}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;background:#7baabd;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg-bot{background:#fff;color:#333;align-self:flex-start;border-bottom-left-radius:4px;}
.msg-user{background:#06c755;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}

/* Rich menu */
.rich-menu{flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;border-top:1px solid #e0e0e0;}
.rich-menu button{padding:18px 8px;border:none;background:#fff;font-size:12px;font-weight:700;color:var(--c-primary);cursor:pointer;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.rich-menu button:last-child{border-right:none;}
.rich-menu button:hover{background:#E0F2F1;}
.rm-icon{font-size:24px;}

/* LIFF overlay */
.liff-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--c-bg);display:flex;flex-direction:column;z-index:10;}
.liff-header{background:var(--c-primary);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;color:#fff;}
.liff-header .close-btn{font-size:22px;cursor:pointer;color:#fff;background:none;border:none;padding:0 4px;opacity:.85;}
.liff-header .close-btn:hover{opacity:1;}
.liff-header .liff-title{font-size:15px;font-weight:600;flex:1;color:#fff;}
.liff-body{flex:1;overflow-y:auto;padding:12px;background:var(--c-bg);}

/* Calendar */
.cal-month{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cal-month button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 12px;color:var(--c-sub);}
.cal-month span{font-size:16px;font-weight:700;color:var(--c-text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:12px;background:var(--c-card);border-radius:12px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cal-dow{font-size:11px;color:var(--c-sub);padding:4px 0;font-weight:500;}
.cal-dow:first-child{color:#EF4444;}
.cal-dow:last-child{color:#3B82F6;}
.cal-day{font-size:14px;padding:8px 0;border-radius:50%;cursor:pointer;transition:.15s;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;}
.cal-day:hover{background:#E0F2F1;}
.cal-day.today{font-weight:700;color:var(--c-primary);}
.cal-day.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--c-primary);}
.cal-day.selected{background:var(--c-primary);color:#fff;font-weight:600;}
.cal-day.selected::after{background:#fff;}
.cal-day.disabled{color:var(--c-border);cursor:default;pointer-events:none;}
.cal-day.disabled:hover{background:none;}
.cal-day.holiday{color:#d32f2f;text-decoration:line-through;}
.cal-day.has-slots{position:relative;}
.cal-day.has-slots::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--c-primary);border-radius:50%;}
.cal-day.no-slots{color:var(--c-border);}
.cal-day.no-slots:hover{background:none;cursor:default;pointer-events:none;}
.cal-day.selected.has-slots::after{background:#fff;}

/* Slots */
.slot-section-title{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--c-text);}
.slot-list{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.slot-item{padding:12px 8px;border:1.5px solid var(--c-primary);border-radius:10px;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:14px;font-weight:500;color:var(--c-primary);background:var(--c-card);text-align:center;transition:.2s;}
.slot-item:hover,.slot-item:active{background:var(--c-primary);color:#fff;}
.slot-item.booked{background:var(--c-bg);color:var(--c-sub);cursor:default;border-color:var(--c-border);}
.slot-item.booked:hover{background:var(--c-bg);border-color:var(--c-border);color:var(--c-sub);}
.slot-status{font-size:11px;padding:2px 8px;border-radius:10px;display:none;}
.slot-status.open{background:#DCFCE7;color:#166534;}
.slot-status.taken{background:#eee;color:#999;}

/* Common buttons */
.confirm-box{background:var(--c-card);border-radius:12px;padding:20px;margin:12px 0;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.confirm-box dt{font-size:13px;color:var(--c-sub);margin-top:8px;}
.confirm-box dd{font-size:15px;font-weight:600;margin-top:2px;color:var(--c-text);}
.confirm-box .time-label{font-size:22px;font-weight:700;margin:8px 0;color:var(--c-text);}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;margin-top:12px;transition:.2s;}
.btn-primary{background:var(--c-primary);color:#fff;}
.btn-primary:hover,.btn-primary:active{background:var(--c-primary-dark);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-danger{background:transparent;color:var(--c-danger);border:1px solid var(--c-danger);padding:10px;font-size:13px;}
.btn-danger:hover,.btn-danger:active{background:#FEF2F2;}
.btn-outline{background:#F3F4F6;color:#374151;border:none;}
.btn-outline:hover{background:#E5E7EB;}

/* Booking cards (customer) */
.booking-card{background:var(--c-card);border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.booking-card .bk-date{font-size:18px;font-weight:600;color:var(--c-text);}
.booking-card .bk-status{display:inline-block;font-size:12px;font-weight:500;padding:2px 10px;border-radius:99px;margin-left:8px;}
.bk-status.confirmed{background:#DCFCE7;color:#166534;}
.bk-status.cancelled{background:#FEE2E2;color:#991B1B;}
.bk-status.done{background:#E0E7FF;color:#3730A3;}
.booking-card .bk-id{font-size:11px;color:var(--c-sub);margin-top:4px;}

/* Customer empty state */
.liff-body .loading{text-align:center;color:var(--c-sub);padding:40px 0;font-size:14px;}
.liff-body .cust-empty{text-align:center;color:var(--c-sub);padding:40px 0;font-size:14px;}

/* Customer toast */
.cust-toast{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;}
.cust-toast.show{opacity:1;}

/* Cancel modal (customer) */
.cust-modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.cust-modal-box{background:#fff;border-radius:16px;padding:24px;margin:16px;max-width:320px;width:100%;}
.cust-modal-box h3{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--c-text);}

/* ================== */
/* === OWNER SIDE === */
/* ================== */
/* Owner styles handled by Tailwind - minimal overrides only */
.ow-input{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:0.5rem;font-size:13px;outline:none;transition:border-color .2s;}
.ow-input:focus{border-color:#ec5b13;box-shadow:0 0 0 3px rgba(236,91,19,.1);}
.ow-hours-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;flex-wrap:wrap;}
.ow-hours-row label{width:40px;font-weight:600;color:#475569;}
.ow-hours-row select,.ow-hours-row input[type="time"]{padding:6px 8px;border:1px solid #e2e8f0;border-radius:0.5rem;font-size:12px;outline:none;}
.ow-hours-row select:focus,.ow-hours-row input[type="time"]:focus{border-color:#ec5b13;}
.ow-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px;}
.ow-cal-cell{min-height:80px;padding:4px 6px;font-size:11px;cursor:pointer;position:relative;background:#fff;border-radius:0.5rem;}
.ow-cal-cell:hover{background:rgba(236,91,19,.04);}
.ow-cal-cell.ow-other{opacity:.35;}
.ow-cal-cell.ow-today{background:rgba(236,91,19,.06);}
.ow-cal-cell.ow-holiday{background:#fff5f5;}
.ow-cal-cell .ow-num{font-weight:600;font-size:12px;margin-bottom:2px;}
.ow-cal-cell.ow-today .ow-num{color:#ec5b13;}
.ow-cal-cell.ow-holiday .ow-num{color:#dc2626;text-decoration:line-through;}
.ow-evt{padding:2px 4px;border-radius:4px;margin-top:1px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.ow-evt.ow-available{background:rgba(16,185,129,.1);color:#059669;}
.ow-evt.ow-confirmed{background:rgba(236,91,19,.1);color:#ec5b13;}
.ow-evt.ow-cancelled{background:rgba(220,38,38,.08);color:#dc2626;}
.ow-evt.ow-completed{background:#f1f5f9;color:#64748b;}

/* Toast */
.toast{position:fixed;top:60px;right:20px;background:#2d3436;color:#fff;padding:14px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;}
.toast.show{opacity:1;}
.toast.error{background:#d32f2f;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;justify-content:center;align-items:center;z-index:100;display:none;}
.modal{background:#fff;border-radius:16px;padding:24px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1e293b;}

/* Loading */
.loading{text-align:center;padding:40px;color:#94a3b8;font-size:13px;}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:9999;}
.loading-overlay .spinner{width:36px;height:36px;border:3px solid #fed7aa;border-top-color:#ec5b13;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.is-loading{opacity:0.6;pointer-events:none;}

/* API indicator */
.api-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.api-badge.live{background:#e8f5e9;color:#2e7d32;}
.api-badge.mock{background:#fff3e0;color:#e65100;}
</style>
</head>
<body>

<div class="top-tab">
  <button onclick="switchView('customer')">顧客側（LINE / スマホ）</button>
  <button class="active" onclick="switchView('owner')">オーナー側（iPad / タブレット）</button>
</div>

<!-- ========== CUSTOMER (Phone) ========== -->
<div class="device-wrap hidden" id="customerView">
  <div class="phone">
    <div class="line-header">
      <span class="back" id="lineBack" style="display:none;" onclick="liffClose()">&#10094;</span>
      <span class="title" id="lineTitle">予約サロン</span>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="rich-menu" id="richMenu">
      <button onclick="openLiff('booking')"><span class="rm-icon">&#128197;</span>予約する</button>
      <button onclick="openLiff('list')"><span class="rm-icon">&#128203;</span>予約確認</button>
      <button onclick="openLiff('history')"><span class="rm-icon">&#128214;</span>施術履歴</button>
    </div>
    <div class="liff-overlay" id="liffOverlay" style="display:none;"></div>
  </div>
</div>

<!-- ========== OWNER (Tablet) ========== -->
<div class="device-wrap" id="ownerView">
  <div style="width:768px;height:1024px;background:#f8f6f6;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;" id="tabletDevice">
    <!-- Login -->
    <div id="tabletLogin" style="display:flex;flex-direction:column;height:100%;">
      <header class="flex items-center px-6 py-4 border-b border-primary/10 bg-white/50 backdrop-blur-md flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined text-lg">event_upcoming</span></div>
          <h1 class="text-xl font-bold tracking-tight text-slate-900">Covalt</h1>
        </div>
      </header>
      <div class="flex-1 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-sm p-8 w-80">
          <h2 class="text-lg font-bold text-center mb-6 text-slate-800">ログイン</h2>
          <div class="text-red-500 text-sm mb-3" id="loginError" style="display:none;"></div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-1">メールアドレス</label>
            <input class="ow-input" id="loginEmail" type="email" placeholder="メールアドレス">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-1">パスワード</label>
            <input class="ow-input" id="loginPass" type="password" placeholder="パスワード">
          </div>
          <button class="w-full py-3 bg-primary hover:bg-orange-600 text-white rounded-lg text-sm font-bold transition-colors" onclick="doLogin()" id="loginBtn">ログイン</button>
          <p class="text-center mt-3 text-[10px] text-slate-400">API: ap-southeast-1</p>
        </div>
      </div>
    </div>
    <!-- Main app -->
    <div id="tabletApp" style="display:none;flex-direction:column;height:100%;">
      <header class="flex items-center justify-between px-6 py-4 border-b border-primary/10 bg-white/50 backdrop-blur-md flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined text-lg">event_upcoming</span></div>
          <h1 class="text-xl font-bold tracking-tight text-slate-900">Covalt</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-400" id="userEmail"></span>
          <button class="p-2 rounded-full hover:bg-primary/10 text-slate-500 transition-colors" onclick="doLogout()" title="ログアウト">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto" id="tabBody"><div class="px-6 py-6" id="mainContent"></div></main>
      <nav class="bg-white/80 backdrop-blur-lg border-t border-primary/10 px-4 py-2 pb-5 flex items-center justify-around flex-shrink-0" id="tabNav">
        <button class="flex flex-col items-center gap-1 text-primary transition-colors" data-page="dashboard" onclick="showPage('dashboard')">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">list_alt</span>
          <span class="text-[10px] font-bold">予約一覧</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="schedule" onclick="showPage('schedule')">
          <span class="material-symbols-outlined">calendar_today</span>
          <span class="text-[10px] font-bold">スケジュール</span>
        </button>
        <div class="relative -top-5">
          <button class="w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/40 active:scale-95 transition-transform" onclick="showQuickAdd()">
            <span class="material-symbols-outlined text-3xl">add</span>
          </button>
        </div>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="customers" onclick="showPage('customers')">
          <span class="material-symbols-outlined">group</span>
          <span class="text-[10px] font-bold">顧客リスト</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" data-page="settings" onclick="showPage('settings')">
          <span class="material-symbols-outlined">settings</span>
          <span class="text-[10px] font-bold">設定</span>
        </button>
      </nav>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<!-- Modal -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
/* ===== CONFIG ===== */
const API_BASE = 'https://4n1y1vgmbl.execute-api.ap-southeast-1.amazonaws.com';

/* ===== STATE ===== */
let authToken = null;
let currentUser = null; // {ownerId, email}
let cachedReservations = [];
let cachedCustomers = [];
let cachedBusinessHours = [];
let cachedClosedDays = [];

/* ===== API HELPER ===== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API_BASE + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    const msg = data?.message || data?.error || 'API Error ' + res.status;
    throw new Error(msg);
  }
  return data;
}

/* ===== UTILS ===== */
const TODAY = new Date();
const YEAR = TODAY.getFullYear(), MONTH = TODAY.getMonth(), DAY = TODAY.getDate();

function fmtDate(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}
function fmtTime(iso) {
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDateTime(iso) { return fmtDate(iso) + ' ' + fmtTime(iso); }
function isoDate(y, m, d) {
  const dt = new Date(y, m, d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function dateKey(d) { return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function statusLabel(s) {
  return s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : s === 'completed' ? '完了' : s;
}
const DAY_MAP = { MONDAY:'月', TUESDAY:'火', WEDNESDAY:'水', THURSDAY:'木', FRIDAY:'金', SATURDAY:'土', SUNDAY:'日' };
const DAY_KEYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

function switchView(v) {
  document.querySelectorAll('.top-tab button').forEach(b => b.classList.remove('active'));
  event.target.closest('button').classList.add('active');
  document.getElementById('customerView').classList.toggle('hidden', v !== 'customer');
  document.getElementById('ownerView').classList.toggle('hidden', v !== 'owner');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

let _loadingEl = null;
function showLoading() {
  if (_loadingEl) return;
  _loadingEl = document.createElement('div');
  _loadingEl.className = 'loading-overlay';
  _loadingEl.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(_loadingEl);
}
function hideLoading() {
  if (_loadingEl) { _loadingEl.remove(); _loadingEl = null; }
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}

/* --- Login --- */
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  btn.textContent = 'ログイン中...';
  btn.disabled = true;

  try {
    const res = await api('POST', '/api/auth/login', { email, password });
    authToken = res.token;
    // Decode user info via verify
    const user = await api('POST', '/api/auth/verify');
    currentUser = { ownerId: user.ownerId, email: user.email || email };
  } catch (e) {
    // If verify fails, still proceed with login token
    if (!authToken) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'ログイン';
      btn.disabled = false;
      return;
    }
    currentUser = { ownerId: '', email };
  }

  localStorage.setItem('covalt_token', authToken);
  localStorage.setItem('covalt_user', JSON.stringify(currentUser));
  document.getElementById('tabletLogin').style.display = 'none';
  document.getElementById('tabletApp').style.display = 'flex';
  document.getElementById('userEmail').textContent = currentUser.email;
  btn.textContent = 'ログイン';
  btn.disabled = false;
  showPage('dashboard');
}

async function doLogout() {
  try { await api('POST', '/api/auth/logout'); } catch(e) {}
  authToken = null;
  currentUser = null;
  localStorage.removeItem('covalt_token');
  localStorage.removeItem('covalt_user');
  document.getElementById('tabletApp').style.display = 'none';
  document.getElementById('tabletLogin').style.display = 'flex';
  showToast('ログアウトしました');
}

/* --- Navigation --- */
function showPage(page) {
  document.querySelectorAll('#tabNav button[data-page]').forEach(b => {
    const active = b.dataset.page === page;
    b.classList.toggle('text-primary', active);
    b.classList.toggle('text-slate-400', !active);
    const icon = b.querySelector('.material-symbols-outlined');
    if (icon) icon.style.fontVariationSettings = active ? "'FILL' 1" : "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";
  });
  document.getElementById('tabBody').scrollTop = 0;
  const mc = document.getElementById('mainContent');
  if (page === 'dashboard') renderDashboard(mc);
  else if (page === 'schedule') renderSchedule(mc);
  else if (page === 'customers') renderCustomers(mc);
  else if (page === 'settings') renderSettings(mc);
}

/* --- Dashboard --- */
let viewMode = 'month';
let ocMonth = MONTH, ocYear = YEAR;

async function renderDashboard(mc) {
  mc.innerHTML = '<div class="loading">読み込み中...</div>';

  // Determine date range based on view
  let startDate, endDate;
  if (viewMode === 'day') {
    startDate = isoDate(YEAR, MONTH, DAY);
    endDate = isoDate(YEAR, MONTH, DAY + 1);
  } else if (viewMode === 'week') {
    const dow = TODAY.getDay();
    const ws = new Date(YEAR, MONTH, DAY - dow);
    const we = new Date(YEAR, MONTH, DAY + (6 - dow));
    startDate = isoDate(ws.getFullYear(), ws.getMonth(), ws.getDate());
    endDate = isoDate(we.getFullYear(), we.getMonth(), we.getDate() + 1);
  } else {
    startDate = isoDate(ocYear, ocMonth, 1);
    const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
    endDate = isoDate(ocYear, ocMonth, lastDay + 1);
  }

  try {
    const data = await api('GET', '/api/owner/reservations?startDate=' + startDate + '&endDate=' + endDate);
    cachedReservations = data.reservations || [];
  } catch (e) {
    cachedReservations = [];
    showToast('予約取得エラー: ' + e.message, true);
  }

  let h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
  h += '<h1 style="font-size:18px;font-weight:700;color:#1e293b;">予約一覧 <span style="font-size:13px;font-weight:400;color:#94a3b8;">(' + cachedReservations.length + '件)</span></h1>';
  h += '</div>';
  h += '<div style="display:flex;gap:6px;margin-bottom:16px;">';
  ['day','week','month','calendar'].forEach(v => {
    const label = {day:'日', week:'週', month:'月', calendar:'カレンダー'}[v];
    const active = viewMode === v;
    h += '<button style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;' + (active ? 'background:#ec5b13;color:#fff;' : 'background:#fff;color:#64748b;border:1px solid #e2e8f0;') + '" onclick="viewMode=\'' + v + '\';renderDashboard(document.getElementById(\'mainContent\'))">' + label + '</button>';
  });
  h += '</div>';

  if (viewMode === 'calendar') {
    h += renderOwnerCalendar();
  } else {
    const sorted = [...cachedReservations].sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
    h += '<div style="background:#fff;border-radius:12px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="border-bottom:2px solid #f1f5f9;">';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">予約ID</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">日時</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">顧客名</th>';
    h += '<th style="text-align:left;padding:12px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;">ステータス</th>';
    h += '</tr></thead><tbody>';
    if (!sorted.length) {
      h += '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:40px 0;font-size:13px;">予約はありません</td></tr>';
    } else {
      sorted.forEach(r => {
        const shortId = r.reservationId.substring(0, 8);
        const badgeStyle = r.status === 'confirmed' ? 'background:rgba(236,91,19,.1);color:#ec5b13;' : r.status === 'cancelled' ? 'background:rgba(220,38,38,.08);color:#dc2626;' : 'background:#f1f5f9;color:#64748b;';
        h += '<tr style="cursor:pointer;border-bottom:1px solid #f8fafc;" onmouseover="this.style.background=\'rgba(236,91,19,.03)\'" onmouseout="this.style.background=\'\'" onclick="showReservationDetail(\'' + r.reservationId + '\')">';
        h += '<td style="padding:12px 14px;font-size:12px;color:#94a3b8;">' + shortId + '...</td>';
        h += '<td style="padding:12px 14px;color:#334155;">' + fmtDateTime(r.dateTime) + '</td>';
        h += '<td style="padding:12px 14px;font-weight:600;color:#1e293b;">' + (r.customerName || '-') + '</td>';
        h += '<td style="padding:12px 14px;"><span style="font-size:11px;padding:3px 10px;border-radius:9999px;font-weight:700;' + badgeStyle + '">' + statusLabel(r.status) + '</span></td>';
        h += '</tr>';
      });
    }
    h += '</tbody></table></div>';
  }
  mc.innerHTML = h;
}

function renderOwnerCalendar() {
  const first = new Date(ocYear, ocMonth, 1);
  const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(ocYear, ocMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<h2 style="font-size:16px;font-weight:700;color:#1e293b;">' + ocYear + '年 ' + (ocMonth+1) + '月</h2>';
  h += '<div style="display:flex;gap:8px;">';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="ocMonth--;if(ocMonth<0){ocMonth=11;ocYear--;}renderDashboard(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_left</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="ocMonth++;if(ocMonth>11){ocMonth=0;ocYear++;}renderDashboard(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span></button>';
  h += '</div></div>';
  h += '<div class="ow-grid">';
  dows.forEach(d => h += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;padding:6px 0;">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(ocYear, ocMonth, d);
    const isToday = d === DAY && ocMonth === MONTH && ocYear === YEAR;
    let cls = 'ow-cal-cell';
    if (isToday) cls += ' ow-today';
    h += '<div class="' + cls + '"><div class="ow-num">' + d + '</div>';

    const dayRsvs = cachedReservations.filter(r => {
      if (r.status === 'cancelled') return false;
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === ocYear && rd.getMonth() === ocMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    dayRsvs.forEach(r => {
      h += '<div class="ow-evt ow-' + r.status + '" onclick="event.stopPropagation();showReservationDetail(\'' + r.reservationId + '\')" title="' + fmtTime(r.dateTime) + ' ' + (r.customerName || '') + '">';
      h += fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4);
      h += '</div>';
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

function renderScheduleCalendar() {
  const first = new Date(schYear, schMonth, 1);
  const lastDay = new Date(schYear, schMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(schYear, schMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<h2 style="font-size:16px;font-weight:700;color:#1e293b;">' + schYear + '年 ' + (schMonth+1) + '月</h2>';
  h += '<div style="display:flex;gap:8px;">';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="schMonth--;if(schMonth<0){schMonth=11;schYear--;}renderSchedule(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_left</span></button>';
  h += '<button style="display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" onclick="schMonth++;if(schMonth>11){schMonth=0;schYear++;}renderSchedule(document.getElementById(\'mainContent\'))"><span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span></button>';
  h += '</div></div>';
  h += '<div class="ow-grid">';
  dows.forEach(d => h += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;padding:6px 0;">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(schYear, schMonth, d);
    const iso = isoDate(schYear, schMonth, d);
    const isToday = d === DAY && schMonth === MONTH && schYear === YEAR;
    const isClosed = closedSet.has(iso);
    const isSel = schSelectedDate === iso;
    const jsDay = dt.getDay();
    const dayKeyMap = [null,'MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];
    const dayEnum = dayKeyMap[jsDay === 0 ? 7 : jsDay];
    const bh = cachedBusinessHours.find(b => b.dayOfWeek === dayEnum);
    const isRegularClosed = bh && !bh.isBusinessDay;

    let cls = 'ow-cal-cell';
    if (isToday) cls += ' ow-today';
    if (isClosed || isRegularClosed) cls += ' ow-holiday';
    const selStyle = isSel ? 'outline:2px solid #ec5b13;outline-offset:-2px;background:rgba(236,91,19,.06);' : '';

    h += '<div class="' + cls + '" style="' + selStyle + '" onclick="selectSchDay(\'' + iso + '\')">';
    h += '<div class="ow-num">' + d + '</div>';

    const slotInfo = schSlotSummary[iso];
    const availSlots = slotInfo ? (slotInfo.availableSlots || []) : [];
    const dayRsvs = schReservations.filter(r => {
      if (r.status === 'cancelled') return false;
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === schYear && rd.getMonth() === schMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    const events = [];
    availSlots.forEach(s => {
      events.push({ time: s.startTime, type: 'available', label: s.startTime + ' 空き' });
    });
    dayRsvs.forEach(r => {
      events.push({ time: fmtTime(r.dateTime), type: r.status, label: fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4), rsvId: r.reservationId });
    });
    events.sort((a, b) => a.time.localeCompare(b.time));

    events.forEach(ev => {
      if (ev.type === 'available') {
        h += '<div class="ow-evt ow-available" title="' + ev.label + '">' + ev.label + '</div>';
      } else {
        h += '<div class="ow-evt ow-' + ev.type + '" onclick="event.stopPropagation();showReservationDetail(\'' + ev.rsvId + '\')" title="' + ev.label + '">' + ev.label + '</div>';
      }
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="ow-cal-cell ow-other"><div class="ow-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

function selectSchDay(iso) {

  loadDaySlots(iso);

async function loadDaySlots(dateStr) {
  const el = document.getElementById('schDayDetail');
  if (!el) return;
  el.innerHTML = '<div class="o-card"><div class="loading">スロット読み込み中...</div></div>';

  let slots = [];
  let dayRsvs = [];
  let isHoliday = false;
  try {
    // Fetch slots and reservations for this day in parallel
    const [y, m, d] = dateStr.split('-').map(Number);
    const nextDateStr = isoDate(y, m - 1, d + 1);
    const [slotRes, rsvRes] = await Promise.all([
      api('GET', '/api/schedule/slots/date/' + dateStr),
      api('GET', '/api/owner/reservations?startDate=' + dateStr + '&endDate=' + nextDateStr),
    ]);
    slots = slotRes.slots || [];
    dayRsvs = (rsvRes.reservations || []).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
  } catch (e) {
    // fallback
  }
  // Check holiday via closed days cache
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));
  isHoliday = closedSet.has(dateStr);

  const d = new Date(dateStr + 'T00:00:00');
  const dayLabel = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
  const dowNames = ['日','月','火','水','木','金','土'];

  const _inp2 = 'padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;outline:none;';

  let h = '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(236,91,19,.05);margin-bottom:16px;">';

  h += '<h3 style="font-size:15px;font-weight:700;color:#1e293b;">' + dayLabel + '（' + dowNames[d.getDay()] + '）の予定</h3>';
  h += '</div>';

  if (isHoliday) {
    h += '<p style="color:#dc2626;font-size:13px;font-weight:600;"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:text-bottom;">event_busy</span> 休業日</p>';
  } else if (slots.length === 0) {
    h += '<p style="color:#94a3b8;font-size:13px;">スロットがありません。下の「一括生成」で作成してください。</p>';
  } else {
    const rsvByRsvId = {};
    dayRsvs.forEach(r => { rsvByRsvId[r.reservationId] = r; });

    h += '<div style="display:flex;flex-direction:column;gap:8px;">';
    slots.sort((a, b) => a.startTime.localeCompare(b.startTime)).forEach(s => {
      const isBooked = s.status === 'booked';
      const r = s.reservationId ? rsvByRsvId[s.reservationId] : null;
      const durMin = s.durationMinutes || '';

      if (isBooked) {
        // Reserved slot - card style from UI sample
        h += '<div style="display:flex;align-items:center;gap:12px;background:#fff;padding:14px;border-radius:12px;border:1px solid rgba(236,91,19,.08);box-shadow:0 1px 2px rgba(0,0,0,.03);">';
        h += '<div style="width:60px;text-align:center;border-right:1px solid #f1f5f9;padding-right:12px;">';
        h += '<p style="font-size:14px;font-weight:700;color:#1e293b;">' + s.startTime + '</p>';

        h += '</div>';
        h += '<div style="flex:1;">';
        h += '<h4 style="font-size:13px;font-weight:700;color:#1e293b;">' + (r ? (r.customerName || '') + ' 様' : '') + '</h4>';

        h += '<div style="padding:4px 12px;' + bStyle + 'border-radius:9999px;font-size:11px;font-weight:700;">' + bLabel + '</div>';
        if (r) h += '<button style="color:#cbd5e1;background:none;border:none;cursor:pointer;" onclick="showReservationDetail(\'' + r.reservationId + '\')"><span class="material-symbols-outlined">more_vert</span></button>';
        h += '</div>';
      } else {
        // Available slot - dashed border style from UI sample
        h += '<div style="display:flex;align-items:center;gap:12px;background:#fff;padding:14px;border-radius:12px;border:1px dashed rgba(236,91,19,.25);opacity:.85;">';
        h += '<div style="width:60px;text-align:center;border-right:1px solid #f1f5f9;padding-right:12px;">';
        h += '<p style="font-size:14px;font-weight:700;color:#1e293b;">' + s.startTime + '</p>';
        if (durMin) h += '<p style="font-size:10px;color:#94a3b8;">' + durMin + 'min</p>';
        h += '</div>';
        h += '<div style="flex:1;">';
        h += '<p style="font-size:13px;font-weight:500;color:#94a3b8;font-style:italic;">空きスロット</p>';
        h += '<p style="font-size:11px;color:#cbd5e1;">' + s.startTime + ' - ' + s.endTime + '</p>';
        h += '</div>';
        h += '<button style="padding:6px 14px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;" onclick="event.stopPropagation();deleteSlot(\'' + s.slotId + '\',\'' + dateStr + '\')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:text-bottom;">close</span> 削除</button>';
        h += '</div>';
      }
    });
    h += '</div>';
  }

  // Quick actions
  h += '<div style="border-top:1px solid #f1f5f9;margin-top:14px;padding-top:14px;">';
  h += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">';

  h += '<select id="quickGenDur" style="' + _inp2 + '"><option value="30">30分</option><option value="60" selected>60分</option><option value="90">90分</option></select>';
  h += '<select id="quickGenBuf" style="' + _inp2 + '"><option value="0">バッファなし</option><option value="5">5分</option><option value="10">10分</option><option value="15">15分</option><option value="30">30分</option></select>';
  h += '</div>';
  h += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">';
  h += '<input type="time" id="quickSingleStart" value="09:00" style="' + _inp2 + 'width:90px;">';
  h += '<span style="font-size:11px;color:#94a3b8;">〜</span>';
  h += '<input type="time" id="quickSingleEnd" value="10:00" style="' + _inp2 + 'width:90px;">';
  h += '<button style="padding:6px 14px;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;" onclick="quickAddSlot(\'' + dateStr + '\')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:text-bottom;">add</span> 1枠追加</button>';
  h += '</div>';

  if (cachedTemplates.length > 0) {
    h += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';

    h += '</div>';
  }
  h += '</div>';

  h += '</div>';
  el.innerHTML = h;

async function quickGenSlots(dateStr) {
  const dur = +document.getElementById('quickGenDur').value;

  try {

    let h = '<p style="font-size:12px;color:#2e7d32;margin-bottom:6px;">' + res.generatedCount + '件のスロットを生成しました</p>';
    if (res.slots && res.slots.length) {
      h += '<div class="slot-grid">';
      res.slots.forEach(s => {
        h += '<div class="slot-chip">' + s.startTime + ' - ' + s.endTime + '</div>';
      });
      h += '</div>';
    }
    el.innerHTML = h;
  } catch (e) {
    el.innerHTML = '<span style="font-size:12px;color:#d32f2f;">' + e.message + '</span>';
  } finally { hideLoading(); }
}

async function deleteSlot(slotId, dateStr) {
  showLoading();
  try {
    await api('DELETE', '/api/schedule/slots/' + slotId);
    showToast('スロットを削除しました');
    loadDaySlots(dateStr);
  } catch (e) {
    showToast('削除エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

async function createSingleSlot() {
  const date = document.getElementById('singleSlotDate').value;
  const startTime = document.getElementById('singleSlotStart').value;
  const endTime = document.getElementById('singleSlotEnd').value;
  if (!date) { showToast('日付を選択してください', true); return; }
  if (!startTime || !endTime) { showToast('開始・終了時間を指定してください', true); return; }
  const el = document.getElementById('singleSlotResult');
  el.innerHTML = '<span style="color:#999;font-size:12px;">追加中...</span>';
  showLoading();
  try {
    const res = await api('POST', '/api/schedule/slots', { date, startTime, endTime });
    el.innerHTML = '<p style="font-size:12px;color:#2e7d32;">' + res.startTime + ' - ' + res.endTime + ' (' + res.durationMinutes + '分) を追加しました</p>';
    if (schSelectedDate === date) loadDaySlots(date);
  } catch (e) {
    el.innerHTML = '<span style="font-size:12px;color:#d32f2f;">' + e.message + '</span>';
  } finally { hideLoading(); }
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// --- Profile Edit ---
function editProfileField(customerId, field, currentValue) {
  let html = '';
  if (field === 'birthDate') {
    html = '<h3>生年月日の編集</h3>'
      + '<div class="form-group"><label>生年月日</label><input class="form-input" id="editProfileVal" type="date" value="' + (currentValue || '') + '"></div>'
      + '<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;background:#0984e3;" onclick="saveProfileField(\'' + customerId + '\',\'birthDate\')">保存</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">キャンセル</button></div>';
  } else if (field === 'gender') {
    html = '<h3>性別の編集</h3>'
      + '<div class="form-group"><label>性別</label><select class="form-input" id="editProfileVal">'
      + '<option value="">未設定</option>'
      + '<option value="male"' + (currentValue === 'male' ? ' selected' : '') + '>男性</option>'
      + '<option value="female"' + (currentValue === 'female' ? ' selected' : '') + '>女性</option>'
      + '<option value="other"' + (currentValue === 'other' ? ' selected' : '') + '>その他</option>'
      + '</select></div>'
      + '<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;background:#0984e3;" onclick="saveProfileField(\'' + customerId + '\',\'gender\')">保存</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">キャンセル</button></div>';
  }
  showModal(html);
}

async function saveProfileField(customerId, field) {
  const val = document.getElementById('editProfileVal').value;
  showLoading();
  try {
    const body = {};
    body[field] = val || null;
    await api('PUT', '/api/customers/' + customerId + '/profile', body);
    closeModal();
    showToast('プロフィールを更新しました');
    showCustomerDetail(customerId);
  } catch (e) {
    showToast('更新エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

// --- Notes ---
function openNewNote(customerId, category) {
  const catLabel = category === 'record' ? '施術記録' : 'メモ';
  const html = '<h3>新規' + catLabel + '</h3>'
    + '<div class="form-group"><label>タイトル</label><input class="form-input" id="newNoteTitle" placeholder="タイトル"></div>'
    + '<div class="form-group"><label>内容</label><textarea class="form-input" id="newNoteContent" rows="6" style="resize:vertical;" placeholder="内容を入力..."></textarea></div>'
    + '<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;background:#0984e3;" onclick="doCreateNote(\'' + customerId + '\',\'' + category + '\')">保存</button><button class="btn btn-outline" style="flex:1;" onclick="closeModal()">キャンセル</button></div>';
  showModal(html);
}

async function doCreateNote(customerId, category) {
  const title = document.getElementById('newNoteTitle').value;
  const content = document.getElementById('newNoteContent').value;
  if (!content) { showToast('内容を入力してください', true); return; }
  showLoading();
  try {
    await api('POST', '/api/customers/' + customerId + '/notes', { category: category, title: title, content: content });
    closeModal();
    showToast('保存しました');
    _custDetailTab = 'notes';
    showCustomerDetail(customerId);
  } catch (e) {
    showToast('保存エラー: ' + e.message, true);
  } finally { hideLoading(); }
}

async function toggleNoteContent(customerId, noteId) {
  const el = document.getElementById('noteBody_' + noteId);
  if (!el) return;
  if (el.style.display === 'block') {
    el.style.display = 'none';
    return;
  }
  el.innerHTML = '<span style="color:#999;">読み込み中...</span>';
  el.style.display = 'block';
  try {
    const data = await api('GET', '/api/customers/' + customerId + '/notes/' + noteId);
    el.textContent = data.content || '(空)';
  } catch (e) {
    el.innerHTML = '<span style="color:#d32f2f;">取得エラー: ' + esc(e.message) + '</span>';
  }
}

function openEditNote(customerId, noteId, currentTitle) {
  // First fetch current content
  showLoading();
  api('GET', '/api/customers/' + customerId + '/notes/' + noteId).then(data => {
    hideLoading();
    const html = '<h3>メモ編集</h3>'

async function fetchMonthSummary(year, month) {
  const startDate = isoDate(year, month, 1);
  const lastDay = new Date(year, month + 1, 0).getDate();
  const endDate = isoDate(year, month, lastDay);
  try {
    const data = await api('GET', '/api/slots/summary?ownerId=' + getCustOwnerId() + '&startDate=' + startDate + '&endDate=' + endDate);
    return data.summary || {};
  } catch (e) {
    console.error('Slot summary fetch error:', e);
    return {};
  }
}

function renderCalendar() {
  const body = document.getElementById('liffBody');
  if (!body) return;
  const first = new Date(calYear, calMonth, 1), lastDay = new Date(calYear, calMonth+1, 0).getDate(), startDow = first.getDay();
  const dows = ['日','月','火','水','木','金','土'];
  const todayDate = new Date(YEAR, MONTH, DAY);

  let h = '<div class="cal-month">';
  h += '<button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}custSlotSummary={};renderCalendar()">&#10094;</button>';
  h += '<span>' + calYear + '年' + (calMonth+1) + '月</span>';
  h += '<button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}custSlotSummary={};renderCalendar()">&#10095;</button>';
  h += '</div><div class="cal-grid">';
  dows.forEach(d => h += '<div class="cal-dow">' + d + '</div>');
  for (let i = 0; i < startDow; i++) h += '<div class="cal-day"></div>';

  const hasSummary = Object.keys(custSlotSummary).length > 0;

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(calYear, calMonth, d);
    const past = dt < todayDate;
    const sel = selectedDate && dateKey(dt) === dateKey(selectedDate);
    const isTd = d === DAY && calMonth === MONTH && calYear === YEAR;
    const iso = isoDate(calYear, calMonth, d);
    const dayInfo = custSlotSummary[iso];
    const availCount = dayInfo ? (dayInfo.availableCount || 0) : 0;

    let c = 'cal-day';
    if (past) {
      c += ' disabled';
    } else if (hasSummary && availCount > 0) {
      c += ' has-slots';
      if (sel) c += ' selected';
      else if (isTd) c += ' today';
    } else if (hasSummary && availCount === 0) {
      c += ' no-slots';
    } else {
      // No summary loaded yet - default styling
      if (sel) c += ' selected';
      else if (isTd) c += ' today';
    }

    if (past || (hasSummary && availCount === 0 && !past)) {
      h += '<div class="' + c + '">' + d + '</div>';
    } else {
      h += '<div class="' + c + '" onclick="pickDate(' + calYear + ',' + calMonth + ',' + d + ')">' + d + '</div>';
    }
  }
  h += '</div>';
  if (selectedDate) h += '<div id="slotsContainer"><div class="loading">空き状況を取得中...</div></div>';
  body.innerHTML = h;
  if (selectedDate) loadAvailableSlots(selectedDate);

  // Fetch slot summary for the visible month if not yet loaded
  if (!hasSummary && !custSummaryLoading) {
    custSummaryLoading = true;
    fetchMonthSummary(calYear, calMonth).then(summary => {
      custSlotSummary = summary;
      custSummaryLoading = false;
      // Re-render only the calendar grid (preserve selected date and slots)
      renderCalendarGrid();
    }).catch(() => { custSummaryLoading = false; });
  }
}

    }
  }
  body.innerHTML = h;

function pickDate(y, m, d) {
  const dt = new Date(y, m, d);
  const todayDate = new Date(YEAR, MONTH, DAY);
  if (dt < todayDate) return;
  // Check if the date has no available slots (when summary is loaded)
  const iso = isoDate(y, m, d);
  const hasSummary = Object.keys(custSlotSummary).length > 0;
  if (hasSummary) {
    const dayInfo = custSlotSummary[iso];
    const availCount = dayInfo ? (dayInfo.availableCount || 0) : 0;
    if (availCount === 0) return;
  }
  selectedDate = dt;
  renderCalendar();
}

/* --- Load available slots from API --- */
async function loadAvailableSlots(dt) {
  const container = document.getElementById('slotsContainer');
  if (!container) return;
  const dateStr = isoDate(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const ownerId = getCustOwnerId();
  try {
    const data = await api('GET', '/api/slots/available?ownerId=' + ownerId + '&date=' + dateStr);
    const slots = data.slots || [];
    const dows = ['日','月','火','水','木','金','土'];
    const dateLabel = (dt.getMonth()+1) + '月' + dt.getDate() + '日 (' + dows[dt.getDay()] + ')';
    let h = '<div class="slot-section-title">' + dateLabel + ' の空き</div>';
    if (slots.length === 0) {
      h += '<div class="cust-empty">この日の空きはありません</div>';
    } else {
      h += '<div class="slot-list">';
      slots.sort((a, b) => a.startTime.localeCompare(b.startTime)).forEach((s, idx) => {
        h += '<div class="slot-item" onclick="selectSlot(' + idx + ')">';
        h += s.startTime;
        h += '</div>';
      });
      h += '</div>';
    }
    container.innerHTML = h;
    // Store slots for reference when selecting
    container._slots = slots;
  } catch (e) {
    container.innerHTML = '<div class="cust-empty">読み込みに失敗しました</div>';
  }
}

  try {
    const custId = await ensureMockCustomer();
    if (!custId) throw new Error('テスト顧客の準備に失敗しました');
    const dateStr = isoDate(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
    const dateTime = dateStr + 'T' + selectedSlot.startTime + ':00+09:00';
    const durationMinutes = selectedSlot.durationMinutes || 60;
    const res = await api('POST', '/api/owner/reservations', {
      customerId: custId,
      slotId: selectedSlot.slotId,
      dateTime: dateTime,
      durationMinutes: durationMinutes,
    });
    hideLoading();
    const rsvId = res.reservationId || res.id || '';
    const shortId = rsvId.substring(0, 8);
    const dows = ['日','月','火','水','木','金','土'];
    const bookedDate = (selectedDate.getMonth()+1) + '月' + selectedDate.getDate() + '日 (' + dows[selectedDate.getDay()] + ')';
    const bookedTime = selectedSlot.startTime + ' - ' + selectedSlot.endTime;
    document.getElementById('liffBody').innerHTML = '<div class="confirm-box" style="text-align:center">'
      + '<div style="font-size:48px;margin-bottom:12px;color:var(--c-primary)">&#10003;</div>'
      + '<div style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--c-text)">予約が完了しました</div>'
      + '<div style="font-size:13px;color:var(--c-sub)">' + bookedDate + '</div>'
      + '<div style="font-size:16px;font-weight:600;margin:4px 0;color:var(--c-text)">' + bookedTime + '</div>'
      + '<div style="font-size:12px;color:var(--c-sub);margin-top:4px">' + shortId + '...</div>'
      + '<button class="btn btn-primary" style="margin-top:16px;" onclick="liffClose()">OK</button>'
      + '</div>';
    addBotMsg('予約が確定しました\n\n日時: ' + fmt(selectedDate) + ' ' + selectedSlot.startTime + ' - ' + selectedSlot.endTime + '\n予約ID: ' + shortId + '...\n\nご来店お待ちしております。');
  } catch (e) {
    hideLoading();
    showToast('予約エラー: ' + e.message, true);
  }
}

async function renderListLiff() {
  document.getElementById('lineTitle').textContent = '予約確認';
  document.getElementById('liffOverlay').innerHTML = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">予約一覧</span></div><div class="liff-body"><div class="loading">読み込み中...</div></div>';
  showLoading();
  try {
    const custId = await ensureMockCustomer();
    const todayStr = isoDate(YEAR, MONTH, DAY);
    const farFuture = isoDate(YEAR + 1, MONTH, DAY);
    const data = await api('GET', '/api/owner/reservations?startDate=' + todayStr + '&endDate=' + farFuture);
    const allRsvs = data.reservations || [];
    // Filter by mock customer
    const upcoming = allRsvs.filter(r => r.customerId === custId && r.status === 'confirmed')
      .sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
    hideLoading();
    let h = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">予約一覧</span></div><div class="liff-body">';
    if (!upcoming.length) {
      h += '<div class="cust-empty">予約はありません</div>';
    } else {
      upcoming.forEach(r => {
        const dt = new Date(r.dateTime);
        const dows = ['日','月','火','水','木','金','土'];
        const dateStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + dows[dt.getDay()] + ')';
        const time = String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
        const dur = r.durationMinutes || 60;
        const endMin = dt.getMinutes() + dur;
        const endH = dt.getHours() + Math.floor(endMin / 60);
        const endM = endMin % 60;
        const endTime = String(endH).padStart(2,'0') + ':' + String(endM).padStart(2,'0');
        h += '<div class="booking-card">';
        h += '<div style="font-size:13px;color:var(--c-sub)">' + dateStr + '</div>';
        h += '<div class="bk-date">' + time + ' - ' + endTime + '</div>';
        h += '<span class="bk-status confirmed">確定</span>';
        h += '<button class="btn btn-danger" onclick="showCancelConfirm(\'' + r.reservationId + '\')">キャンセル</button>';
        h += '</div>';
      });
    }
    h += '</div>';
    document.getElementById('liffOverlay').innerHTML = h;
  } catch (e) {
    hideLoading();
    document.getElementById('liffOverlay').innerHTML = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">予約一覧</span></div><div class="liff-body"><div class="cust-empty">予約はありません</div></div>';
  }
}

async function showCancelConfirm(reservationId) {
  // Fetch cancellation policy and show confirmation screen
  let policy = '';
  try {
    const settings = await api('GET', '/api/schedule/settings');
    policy = settings.cancellationPolicy || '';
  } catch (e) { /* no policy */ }

  let h = '<div class="liff-header"><button class="close-btn" onclick="renderListLiff()">&times;</button><span class="liff-title">キャンセル確認</span></div><div class="liff-body">';
  h += '<div class="cust-modal-box" style="margin:0 auto;">';
  h += '<h3>予約をキャンセルしますか？</h3>';
  if (policy) {
    h += '<div style="font-size:13px;color:var(--c-sub);margin-bottom:16px;white-space:pre-wrap;line-height:1.6;max-height:200px;overflow-y:auto">' + policy.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>';
  }
  h += '<div style="display:flex;gap:8px;">';
  h += '<button class="btn btn-outline" style="flex:1;padding:12px;font-size:14px;" onclick="renderListLiff()">戻る</button>';
  h += '<button class="btn" style="flex:1;padding:12px;font-size:14px;background:var(--c-danger);color:#fff;" onclick="cancelCustomerReservation(\'' + reservationId + '\')">キャンセルする</button>';
  h += '</div></div></div>';
  document.getElementById('liffOverlay').innerHTML = h;
}

async function cancelCustomerReservation(reservationId) {
  showLoading();
  try {
    await api('PUT', '/api/owner/reservations/' + reservationId + '/cancel');
    hideLoading();
    showToast('予約をキャンセルしました');
    addBotMsg('予約をキャンセルしました\n予約ID: ' + reservationId.substring(0, 8) + '...');
    renderListLiff();
  } catch (e) {
    hideLoading();
    showToast('キャンセルエラー: ' + e.message, true);
  }
}

let _historyData = []; // cached history reservations
let _historyNotes = []; // cached notes for history
let _historyAttachments = []; // cached attachments for history
let _historyCustId = null;

async function renderHistoryLiff() {
  document.getElementById('lineTitle').textContent = '施術履歴';
  document.getElementById('liffOverlay').innerHTML = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">施術履歴</span></div><div class="liff-body"><div class="loading">読み込み中...</div></div>';
  showLoading();
  try {
    const custId = await ensureMockCustomer();
    _historyCustId = custId;
    const pastStart = isoDate(YEAR - 1, 0, 1);
    const todayStr = isoDate(YEAR, MONTH, DAY + 1);
    const farFuture = isoDate(YEAR + 1, MONTH, DAY);
    const [pastData, futureData, notesData, attachData] = await Promise.all([
      api('GET', '/api/owner/reservations?startDate=' + pastStart + '&endDate=' + todayStr),
      api('GET', '/api/owner/reservations?startDate=' + todayStr + '&endDate=' + farFuture),
      api('GET', '/api/customers/' + custId + '/notes').catch(() => ({ notes: [] })),
      api('GET', '/api/customers/' + custId + '/attachments').catch(() => ({ attachments: [] })),
    ]);
    const allRsvs = [...(pastData.reservations || []), ...(futureData.reservations || [])];
    _historyNotes = (notesData.notes || []);
    _historyAttachments = (attachData.attachments || []).filter(a => a.category === 'photo');
    const todayDate = new Date(YEAR, MONTH, DAY);
    const history = allRsvs.filter(r => {
      if (r.customerId !== custId) return false;
      if (r.status === 'completed' || r.status === 'cancelled') return true;
      if (r.status === 'confirmed' && new Date(r.dateTime) < todayDate) return true;
      return false;
    }).sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
    const seen = new Set();
    _historyData = history.filter(r => { if (seen.has(r.reservationId)) return false; seen.add(r.reservationId); return true; });
    hideLoading();
    renderHistoryList();
  } catch (e) {
    hideLoading();
    document.getElementById('liffOverlay').innerHTML = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">施術履歴</span></div><div class="liff-body"><div class="cust-empty">施術履歴はありません</div></div>';
  }
}

function renderHistoryList() {
  const statusLabelCust = s => s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : s === 'completed' ? '完了' : s;
  let h = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">施術履歴</span></div><div class="liff-body">';
  if (!_historyData.length) {
    h += '<div class="cust-empty">施術履歴はありません</div>';
  } else {
    _historyData.forEach((r, idx) => {
      const dt = new Date(r.dateTime);
      const dows = ['日','月','火','水','木','金','土'];
      const dateStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + dows[dt.getDay()] + ')';
      const time = String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
      const dur = r.durationMinutes || 60;
      const endMin = dt.getMinutes() + dur;
      const endH = dt.getHours() + Math.floor(endMin / 60);
      const endM = endMin % 60;
      const endTime = String(endH).padStart(2,'0') + ':' + String(endM).padStart(2,'0');
      const sCls = r.status === 'confirmed' ? 'confirmed' : r.status === 'cancelled' ? 'cancelled' : 'done';
      // Count matching notes/photos for this date
      const rsvDateKey = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      const matchNotes = _historyNotes.filter(n => n.createdAt && n.createdAt.substring(0,10) === rsvDateKey);
      const matchRecords = matchNotes.filter(n => n.category === 'record');
      const matchMemos = matchNotes.filter(n => n.category === 'note');
      const matchPhotos = _historyAttachments.filter(a => a.createdAt && a.createdAt.substring(0,10) === rsvDateKey);
      const hasExtras = matchNotes.length > 0 || matchPhotos.length > 0;
      h += '<div class="booking-card" style="cursor:pointer;" onclick="showHistoryDetail(' + idx + ')">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      h += '<div><div style="font-size:13px;color:var(--c-sub)">' + dateStr + '</div>';
      h += '<div class="bk-date">' + time + ' - ' + endTime + '</div></div>';
      h += '<span class="bk-status ' + sCls + '">' + statusLabelCust(r.status) + '</span>';
      h += '</div>';
      if (hasExtras) {
        h += '<div style="display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--c-sub);">';
        if (matchRecords.length) h += '<span style="display:flex;align-items:center;gap:2px;">&#128221; 記録 ' + matchRecords.length + '件</span>';
        if (matchMemos.length) h += '<span style="display:flex;align-items:center;gap:2px;">&#128214; メモ ' + matchMemos.length + '件</span>';
        if (matchPhotos.length) h += '<span style="display:flex;align-items:center;gap:2px;">&#128247; 写真 ' + matchPhotos.length + '件</span>';
        h += '</div>';
      }
      h += '</div>';
    });
  }
  h += '</div>';
  document.getElementById('liffOverlay').innerHTML = h;
}

async function showHistoryDetail(idx) {
  const r = _historyData[idx];
  if (!r) return;
  const dt = new Date(r.dateTime);
  const dows = ['日','月','火','水','木','金','土'];
  const dateStr = dt.getFullYear() + '/' + (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + dows[dt.getDay()] + ')';
  const time = String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
  const dur = r.durationMinutes || 60;
  const endMin = dt.getMinutes() + dur;
  const endH = dt.getHours() + Math.floor(endMin / 60);
  const endM = endMin % 60;
  const endTime = String(endH).padStart(2,'0') + ':' + String(endM).padStart(2,'0');
  const statusLabelCust = s => s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : s === 'completed' ? '完了' : s;
  const sCls = r.status === 'confirmed' ? 'confirmed' : r.status === 'cancelled' ? 'cancelled' : 'done';

  // Match notes/photos by date
  const rsvDateKey = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const matchNotes = _historyNotes.filter(n => n.createdAt && n.createdAt.substring(0,10) === rsvDateKey);
  const matchPhotos = _historyAttachments.filter(a => a.createdAt && a.createdAt.substring(0,10) === rsvDateKey);

  let h = '<div class="liff-header"><button class="close-btn" onclick="renderHistoryList()">&times;</button><span class="liff-title">施術詳細</span></div><div class="liff-body">';

  // Reservation info
  h += '<div style="background:#f8f8f8;border-radius:12px;padding:16px;margin-bottom:16px;">';
  h += '<div style="font-size:15px;font-weight:700;margin-bottom:4px;">' + dateStr + '</div>';
  h += '<div style="font-size:14px;color:#555;">' + time + ' - ' + endTime + '（' + dur + '分）</div>';
  h += '<span class="bk-status ' + sCls + '" style="margin-top:8px;display:inline-block;">' + statusLabelCust(r.status) + '</span>';
  h += '</div>';

  // Separate records and memos
  const matchRecords = matchNotes.filter(n => n.category === 'record');
  const matchMemos = matchNotes.filter(n => n.category === 'note');

  // Treatment records
  h += '<div style="margin-bottom:16px;">';
  h += '<h4 style="font-size:14px;font-weight:700;margin-bottom:8px;">&#128221; 施術記録</h4>';
  if (!matchRecords.length) {
    h += '<p style="font-size:13px;color:#999;padding:8px 0;">この日の施術記録はありません</p>';
  } else {
    matchRecords.forEach(n => {
      h += '<div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;">';
      h += '<div style="font-size:13px;font-weight:700;">' + esc(n.title || '無題') + '</div>';
      h += '<div id="histNote_' + n.noteId + '" style="display:none;margin-top:8px;font-size:12px;color:#555;white-space:pre-wrap;line-height:1.6;"></div>';
      h += '<button style="border:none;background:none;color:#06c755;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;" onclick="toggleHistoryNote(\'' + n.noteId + '\')">内容を表示</button>';
      h += '</div>';
    });
  }
  h += '</div>';

  // Memos
  h += '<div style="margin-bottom:16px;">';
  h += '<h4 style="font-size:14px;font-weight:700;margin-bottom:8px;">&#128214; メモ</h4>';
  if (!matchMemos.length) {
    h += '<p style="font-size:13px;color:#999;padding:8px 0;">この日のメモはありません</p>';
  } else {
    matchMemos.forEach(n => {
      h += '<div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;">';
      h += '<div style="font-size:13px;font-weight:700;">' + esc(n.title || '無題') + '</div>';
      h += '<div id="histNote_' + n.noteId + '" style="display:none;margin-top:8px;font-size:12px;color:#555;white-space:pre-wrap;line-height:1.6;"></div>';
      h += '<button style="border:none;background:none;color:#06c755;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;" onclick="toggleHistoryNote(\'' + n.noteId + '\')">内容を表示</button>';
      h += '</div>';
    });
  }
  h += '</div>';

  // Photos
  h += '<div style="margin-bottom:16px;">';
  h += '<h4 style="font-size:14px;font-weight:700;margin-bottom:8px;">&#128247; 写真</h4>';
  if (!matchPhotos.length) {
    h += '<p style="font-size:13px;color:#999;padding:8px 0;">この日の写真はありません</p>';
  } else {
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">';
    matchPhotos.forEach(a => {
      h += '<div style="aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f0f0f0;">';
      h += '<img id="histPhoto_' + a.attachmentId + '" style="width:100%;height:100%;object-fit:cover;" src="" alt="' + esc(a.fileName) + '">';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  h += '<button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="renderHistoryList()">一覧に戻る</button>';
  h += '</div>';
  document.getElementById('liffOverlay').innerHTML = h;

  // Load photo presigned URLs
  if (matchPhotos.length && _historyCustId) {
    matchPhotos.forEach(a => {
      api('GET', '/api/customers/' + _historyCustId + '/attachments/' + a.attachmentId + '/url')
        .then(res => {
          const img = document.getElementById('histPhoto_' + a.attachmentId);
          if (img) img.src = res.presignedUrl;
        }).catch(() => {});
    });
  }
}

async function toggleHistoryNote(noteId) {
  const el = document.getElementById('histNote_' + noteId);
  if (!el) return;
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  if (!_historyCustId) return;
  el.innerHTML = '<span style="color:#999;">読み込み中...</span>';
  el.style.display = 'block';
  try {
    const data = await api('GET', '/api/customers/' + _historyCustId + '/notes/' + noteId);
    el.textContent = data.content || '(空)';
  } catch (e) {
    el.innerHTML = '<span style="color:#d32f2f;">取得エラー</span>';
  }
}

/* INIT */
(function restoreSession() {
  const savedToken = localStorage.getItem('covalt_token');
  const savedUser = localStorage.getItem('covalt_user');
  if (savedToken && savedUser) {
    authToken = savedToken;
    try { currentUser = JSON.parse(savedUser); } catch(e) { return; }
    // Verify token is still valid
    api('POST', '/api/auth/verify').then(user => {
      currentUser = { ownerId: user.ownerId, email: user.email || currentUser.email };
      localStorage.setItem('covalt_user', JSON.stringify(currentUser));
      document.getElementById('tabletLogin').style.display = 'none';
      document.getElementById('tabletApp').style.display = 'flex';
      document.getElementById('userEmail').textContent = currentUser.email;
      showPage('dashboard');
    }).catch(() => {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('covalt_token');
      localStorage.removeItem('covalt_user');
    });
  }
})();
