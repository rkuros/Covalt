/* === Top Tab === */

.msg-user{background:#06c755;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}

/* Rich menu */
.rich-menu{flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;border-top:1px solid #e0e0e0;}
.rich-menu button{padding:18px 8px;border:none;background:#fff;font-size:12px;font-weight:700;color:#06c755;cursor:pointer;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;gap:6px;}

.cal-month span{font-size:15px;font-weight:700;}

.cal-dow{font-size:11px;color:#999;padding:4px 0;}

.cal-day:hover{background:#e8f5e9;}
.cal-day.today{font-weight:700;color:#06c755;}
.cal-day.selected{background:#06c755;color:#fff;}

.cal-day.disabled:hover{background:none;}
.cal-day.holiday{color:#d32f2f;text-decoration:line-through;}

function renderCalendar(){
  const body=document.getElementById('liffBody');
  const first=new Date(calYear,calMonth,1),lastDay=new Date(calYear,calMonth+1,0).getDate(),startDow=first.getDay();
  const dows=['жЧ•','жЬИ','зБЂ','ж∞і','жЬ®','йЗС','еЬЯ'];
  let h='<div class="cal-month"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&#10094;</button><span>'+calYear+'еєі'+(calMonth+1)+'жЬИ</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&#10095;</button></div><div class="cal-grid">';
  dows.forEach(d=>h+='<div class="cal-dow">'+d+'</div>');
  for(let i=0;i<startDow;i++)h+='<div class="cal-day"></div>';
  for(let d=1;d<=lastDay;d++){
    const dt=new Date(calYear,calMonth,d),past=dt<new Date(YEAR,MONTH,DAY),hol=HOLIDAYS[dateKey(dt)],sel=selectedDate&&dateKey(dt)===dateKey(selectedDate),isTd=d===DAY&&calMonth===MONTH&&calYear===YEAR;
    let c='cal-day';if(past)c+=' disabled';else if(hol)c+=' holiday disabled';else if(sel)c+=' selected';else if(isTd)c+=' today';
    h+='<div class="'+c+'" onclick="pickDate('+calYear+','+calMonth+','+d+')">'+d+'</div>';
  }
  h+='</div>';
  if(selectedDate)h+=renderSlots(selectedDate);
  body.innerHTML=h;
}

function renderSlots(dt){

}

function renderOwnerCalendar(){
  const first=new Date(ocYear,ocMonth,1);
  const lastDay=new Date(ocYear,ocMonth+1,0).getDate();
  const startDow=first.getDay();
  const prevLast=new Date(ocYear,ocMonth,0).getDate();
  const dows=['жЧ•','жЬИ','зБЂ','ж∞і','жЬ®','йЗС','еЬЯ'];

  let h='<div class="o-card" style="padding:12px;">';
  h+='<div class="oc-month"><button onclick="ocMonth--;if(ocMonth<0){ocMonth=11;ocYear--;}renderDashboard(document.getElementById(\'mainContent\'))">&#10094;</button><span>'+ocYear+'еєі'+(ocMonth+1)+'жЬИ</span><button onclick="ocMonth++;if(ocMonth>11){ocMonth=0;ocYear++;}renderDashboard(document.getElementById(\'mainContent\'))">&#10095;</button></div>';
  h+='<div class="oc-grid">';
  dows.forEach(d=>h+='<div class="oc-dow">'+d+'</div>');

  for(let i=0;i<startDow;i++){
    const d=prevLast-startDow+1+i;
    h+='<div class="oc-cell oc-other"><div class="oc-num">'+d+'</div></div>';
  }

  for(let d=1;d<=lastDay;d++){
    const dt=new Date(ocYear,ocMonth,d);
    const dk=dateKey(dt);
    const isToday=d===DAY&&ocMonth===MONTH&&ocYear===YEAR;
    const isHol=HOLIDAYS[dk];
    let cls='oc-cell';
    if(isToday)cls+=' oc-today';
    if(isHol)cls+=' oc-holiday';
    h+='<div class="'+cls+'">';
    h+='<div class="oc-num">'+d+'</div>';
    const dayBookings=BOOKINGS.filter(b=>dateKey(b.date)===dk).sort((a,b)=>a.time.localeCompare(b.time));
    dayBookings.forEach(b=>{
      h+='<div class="oc-evt oc-'+b.status+'" onclick="showBookingDetail(\''+b.id+'\')" title="'+b.time+' '+b.customer+'">'+b.time+' '+b.customer+'</div>';
    });
    h+='</div>';
  }

  const totalCells=startDow+lastDay;
  const remaining=(7-totalCells%7)%7;
  for(let i=1;i<=remaining;i++){
    h+='<div class="oc-cell oc-other"><div class="oc-num">'+i+'</div></div>';
  }

  h+='</div></div>';
  return h;
}

function doManualBooking(){
  const cid=+document.getElementById('manualCustomer').value,c=CUSTOMERS.find(x=>x.id===cid),d=document.getElementById('manualDate').value,t=document.getElementById('manualTime').value;
  if(!d){showToast('жЧ•дїШгВТеЕ•еКЫгБЧгБ¶гБПгБ†гБХгБД');return;}
  const p=d.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  if(BOOKINGS.find(b=>dateKey(b.date)===dateKey(dt)&&b.time===t&&b.status==='confirmed')){showToast('гБУгБЃжЩВйЦУеЄѓгБѓжЧҐгБЂдЇИзіДжЄИгБњгБІгБЩ');return;}
  const id='RSV-'+String(nextId).padStart(3,'0');nextId++;
  BOOKINGS.push({id,date:dt,time:t,customer:c.name,customerId:cid,status:'confirmed'});
  closeModal();renderDashboard(document.getElementById('mainContent'));showToast('дЇИзіД '+id+' гВТдљЬжИРгБЧгБЊгБЧгБЯ');

/* Schedule */

  h+='<div class="o-card"><h3 style="font-size:14px;margin-bottom:8px;">дЉСж•≠жЧ•</h3><div style="display:flex;gap:6px;align-items:center;"><input class="form-input" type="date" id="holidayInput" style="width:180px;font-size:12px;"><button class="btn btn-outline" style="width:auto;padding:6px 14px;font-size:12px;margin:0;" onclick="addHoliday()">ињљеК†</button></div><div style="margin-top:8px;">';
  Object.keys(HOLIDAYS).forEach(k=>{h+='<span style="display:inline-block;background:#fce4ec;padding:3px 10px;border-radius:12px;font-size:11px;margin:3px;">'+k+' <span style="cursor:pointer;margin-left:4px;" onclick="removeHoliday(\''+k+'\')">&times;</span></span>';});

  HOURS.forEach(t=>{const has=booked.includes(t);h+='<div class="slot-chip'+(has?' has-booking':'')+'">'+t+(has?'<br><span style="font-size:10px;color:#1565c0;">дЇИзіДгБВгВК</span>':'')+'</div>';});
  mc.innerHTML=h+'</div></div>';
}

function addHoliday(){
  const v=document.getElementById('holidayInput').value;if(!v)return;
  const p=v.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]),dk=dateKey(dt);
  if(BOOKINGS.some(b=>dateKey(b.date)===dk&&b.status==='confirmed')){showToast('гБУгБЃжЧ•гБЂгБѓдЇИзіДгБМгБВгВКгБЊгБЩгАВеЕИгБЂгВ≠гГ£гГ≥гВїгГЂгБЧгБ¶гБПгБ†гБХгБДгАВ');return;}
  HOLIDAYS[dk]=true;renderSchedule(document.getElementById('mainContent'));showToast(dk+' гВТдЉСж•≠жЧ•гБЂи®≠еЃЪгБЧгБЊгБЧгБЯ');
}
function removeHoliday(k){delete HOLIDAYS[k];renderSchedule(document.getElementById('mainContent'));showToast('дЉСж•≠жЧ•гВТиІ£йЩ§гБЧгБЊгБЧгБЯ');}

function filterCust(){const q=document.getElementById('custSearch').value.toLowerCase();document.querySelectorAll('#custTable tbody tr').forEach(r=>{r.style.display=r.children[0].textContent.toLowerCase().includes(q)?'':'none';});}

function showCustDetail(id){

  document.getElementById('mainContent').innerHTML=h;

function saveCustName(id){const c=CUSTOMERS.find(x=>x.id===id);if(!c)return;c.name=document.getElementById('editCustName').value;BOOKINGS.filter(b=>b.customerId===id).forEach(b=>b.customer=c.name);showToast('й°ІеЃҐжГЕе†±гВТдњЭе≠ШгБЧгБЊгБЧгБЯ');}
