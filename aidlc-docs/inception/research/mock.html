<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE予約システム - APIテストUI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#e8e8e8;color:#333;}

/* === Top Tab === */
.top-tab{display:flex;justify-content:center;gap:0;padding:16px 16px 0;background:#e8e8e8;}
.top-tab button{padding:10px 32px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#ccc;color:#666;border-radius:8px 8px 0 0;}
.top-tab button.active{background:#fff;color:#333;}

/* === Device frames === */
.device-wrap{display:flex;justify-content:center;padding:0 16px 32px;background:#e8e8e8;}
.device-wrap.hidden{display:none;}
.phone{width:375px;height:740px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}
.tablet{width:620px;height:820px;background:#fff;border-radius:0 0 24px 24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);position:relative;}

/* ==================== */
/* === CUSTOMER SIDE === */
/* ==================== */

/* LINE header */
.line-header{background:#06c755;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.line-header .back{font-size:20px;cursor:pointer;}
.line-header .title{font-size:15px;font-weight:700;flex:1;}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;background:#7baabd;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg-bot{background:#fff;color:#333;align-self:flex-start;border-bottom-left-radius:4px;}
.msg-user{background:#06c755;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}

/* Rich menu */
.rich-menu{flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;border-top:1px solid #e0e0e0;}
.rich-menu button{padding:18px 8px;border:none;background:#fff;font-size:12px;font-weight:700;color:#06c755;cursor:pointer;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.rich-menu button:last-child{border-right:none;}
.rich-menu button:hover{background:#f0faf0;}
.rm-icon{font-size:24px;}

/* LIFF overlay */
.liff-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;flex-direction:column;z-index:10;}
.liff-header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.liff-header .close-btn{font-size:22px;cursor:pointer;color:#999;background:none;border:none;padding:0 4px;}
.liff-header .liff-title{font-size:15px;font-weight:700;flex:1;}
.liff-body{flex:1;overflow-y:auto;padding:16px;}

/* Calendar */
.cal-month{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-month button{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;}
.cal-month span{font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:16px;}
.cal-dow{font-size:11px;color:#999;padding:4px 0;}
.cal-day{font-size:13px;padding:8px 0;border-radius:8px;cursor:pointer;}
.cal-day:hover{background:#e8f5e9;}
.cal-day.today{font-weight:700;color:#06c755;}
.cal-day.selected{background:#06c755;color:#fff;}
.cal-day.disabled{color:#ccc;cursor:default;}
.cal-day.disabled:hover{background:none;}
.cal-day.holiday{color:#d32f2f;text-decoration:line-through;}

/* Slots */
.slot-list{display:flex;flex-direction:column;gap:6px;}
.slot-item{padding:12px;border:1px solid #e0e0e0;border-radius:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:14px;}
.slot-item:hover{border-color:#06c755;background:#f0faf0;}
.slot-item.booked{background:#f5f5f5;color:#999;cursor:default;border-color:#eee;}
.slot-item.booked:hover{background:#f5f5f5;border-color:#eee;}
.slot-status{font-size:11px;padding:2px 8px;border-radius:10px;}
.slot-status.open{background:#e8f5e9;color:#2e7d32;}
.slot-status.taken{background:#eee;color:#999;}

/* Common buttons */
.confirm-box{background:#f9f9f9;border-radius:12px;padding:20px;margin:12px 0;}
.confirm-box dt{font-size:12px;color:#999;margin-top:8px;}
.confirm-box dd{font-size:15px;font-weight:600;margin-top:2px;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;margin-top:12px;}
.btn-primary{background:#06c755;color:#fff;}
.btn-primary:hover{background:#05b34c;}
.btn-danger{background:#d32f2f;color:#fff;}
.btn-danger:hover{background:#b71c1c;}
.btn-outline{background:#fff;color:#333;border:1px solid #ccc;}
.btn-outline:hover{background:#f5f5f5;}

/* Booking cards (customer) */
.booking-card{border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;}
.booking-card:hover{border-color:#06c755;}
.booking-card .bk-date{font-size:15px;font-weight:700;}
.booking-card .bk-status{font-size:11px;padding:2px 8px;border-radius:10px;margin-left:8px;}
.bk-status.confirmed{background:#e8f5e9;color:#2e7d32;}
.bk-status.cancelled{background:#fce4ec;color:#c62828;}
.bk-status.done{background:#e3f2fd;color:#1565c0;}
.booking-card .bk-id{font-size:11px;color:#999;margin-top:4px;}

/* ================== */
/* === OWNER SIDE === */
/* ================== */

/* Tablet top bar */
.tab-topbar{background:#2d3436;color:#fff;padding:14px 20px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.tab-topbar .tab-logo{font-size:15px;font-weight:700;}
.tab-topbar .tab-user{font-size:11px;color:#b2bec3;margin-right:12px;}
.tab-topbar .tab-logout{background:none;border:1px solid #636e72;color:#b2bec3;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;}
.tab-topbar .tab-logout:hover{color:#fff;border-color:#fff;}

/* Tablet body */
.tab-body{flex:1;overflow-y:auto;background:#f5f6fa;}
.tab-inner{padding:20px;}

/* Tablet bottom nav */
.tab-nav{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid #e0e0e0;}
.tab-nav button{padding:10px 4px 12px;border:none;background:#fff;font-size:10px;font-weight:600;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tab-nav button .nav-icon{font-size:20px;}
.tab-nav button:hover{color:#0984e3;}
.tab-nav button.active{color:#0984e3;}

/* Login inside tablet */
.tab-login{display:flex;justify-content:center;align-items:center;height:100%;background:#f5f6fa;}
.login-box{background:#fff;padding:32px;border-radius:12px;width:340px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.login-box h2{font-size:18px;margin-bottom:20px;text-align:center;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#555;}
.form-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;}
.form-input:focus{outline:none;border-color:#0984e3;}
.login-error{color:#d32f2f;font-size:12px;margin-bottom:12px;display:none;}

/* Page title */
.page-title{font-size:18px;font-weight:700;margin-bottom:16px;}

/* Cards */
.o-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;}

/* Table */
.o-table{width:100%;border-collapse:collapse;font-size:12px;}
.o-table th{text-align:left;padding:8px 10px;border-bottom:2px solid #e0e0e0;font-weight:600;color:#555;}
.o-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;}
.o-table tr:hover{background:#f9f9f9;}
.o-table tr{cursor:pointer;}
.status-badge{font-size:11px;padding:2px 8px;border-radius:10px;}
.status-badge.s-confirmed{background:#e8f5e9;color:#2e7d32;}
.status-badge.s-cancelled{background:#fce4ec;color:#c62828;}
.status-badge.s-completed{background:#e3f2fd;color:#1565c0;}

/* View toggle */
.view-toggle{display:flex;gap:4px;margin-bottom:12px;}
.view-toggle button{padding:5px 14px;border:1px solid #ddd;background:#fff;border-radius:6px;font-size:12px;cursor:pointer;}
.view-toggle button.active{background:#0984e3;color:#fff;border-color:#0984e3;}

/* Owner calendar */
.oc-month{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.oc-month button{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 8px;color:#0984e3;}
.oc-month span{font-size:14px;font-weight:700;}
.oc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e0e0e0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;}
.oc-dow{background:#f5f6fa;font-size:10px;font-weight:600;color:#999;text-align:center;padding:6px 0;}
.oc-cell{background:#fff;min-height:80px;padding:4px 6px;font-size:11px;cursor:pointer;position:relative;}
.oc-cell:hover{background:#f0f7ff;}
.oc-cell.oc-other{background:#fafafa;color:#ccc;}
.oc-cell.oc-today{background:#e8f4fd;}
.oc-cell.oc-holiday{background:#fff5f5;}
.oc-cell .oc-num{font-weight:600;font-size:12px;margin-bottom:2px;}
.oc-cell.oc-today .oc-num{color:#0984e3;}
.oc-cell.oc-holiday .oc-num{color:#d32f2f;text-decoration:line-through;}
.oc-evt{padding:2px 4px;border-radius:3px;margin-top:1px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.oc-evt.oc-available{background:#e8f5e9;color:#2e7d32;}
.oc-evt.oc-confirmed{background:#e3f2fd;color:#1565c0;}
.oc-evt.oc-cancelled{background:#fce4ec;color:#c62828;}
.oc-evt.oc-completed{background:#f5f5f5;color:#757575;}

/* Detail */
.detail-panel{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.detail-row{display:flex;margin-bottom:10px;}
.detail-row dt{width:120px;font-size:12px;color:#999;flex-shrink:0;}
.detail-row dd{font-size:13px;font-weight:500;}
.detail-actions{display:flex;gap:8px;margin-top:16px;}
.detail-actions .btn{width:auto;padding:10px 20px;font-size:13px;}

/* Schedule */
.hours-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:12px;flex-wrap:wrap;}
.hours-row label{width:40px;font-weight:600;}
.hours-row select,.hours-row input[type="time"]{padding:5px;border:1px solid #ddd;border-radius:4px;font-size:12px;}
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;}
.slot-chip{padding:8px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;text-align:center;cursor:pointer;}
.slot-chip:hover{border-color:#0984e3;}
.slot-chip.has-booking{background:#e3f2fd;border-color:#90caf9;}

/* Toast */
.toast{position:fixed;top:60px;right:20px;background:#2d3436;color:#fff;padding:14px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;}
.toast.show{opacity:1;}
.toast.error{background:#d32f2f;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;justify-content:center;align-items:center;z-index:100;display:none;}
.modal{background:#fff;border-radius:12px;padding:24px;width:380px;max-width:90vw;}
.modal h3{font-size:16px;margin-bottom:16px;}

/* Loading */
.loading{text-align:center;padding:40px;color:#999;font-size:13px;}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;}
.loading-overlay .spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#0984e3;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.is-loading{opacity:0.6;pointer-events:none;}

/* API indicator */
.api-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.api-badge.live{background:#e8f5e9;color:#2e7d32;}
.api-badge.mock{background:#fff3e0;color:#e65100;}
</style>
</head>
<body>

<div class="top-tab">
  <button onclick="switchView('customer')">顧客側（LINE / スマホ）<span class="api-badge mock">MOCK</span></button>
  <button class="active" onclick="switchView('owner')">オーナー側（iPad / タブレット）<span class="api-badge live">LIVE API</span></button>
</div>

<!-- ========== CUSTOMER (Phone) ========== -->
<div class="device-wrap hidden" id="customerView">
  <div class="phone">
    <div class="line-header">
      <span class="back" id="lineBack" style="display:none;" onclick="liffClose()">&#10094;</span>
      <span class="title" id="lineTitle">予約サロン</span>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="rich-menu" id="richMenu">
      <button onclick="openLiff('booking')"><span class="rm-icon">&#128197;</span>予約する</button>
      <button onclick="openLiff('list')"><span class="rm-icon">&#128203;</span>予約確認</button>
      <button onclick="openLiff('history')"><span class="rm-icon">&#128214;</span>予約履歴</button>
    </div>
    <div class="liff-overlay" id="liffOverlay" style="display:none;"></div>
  </div>
</div>

<!-- ========== OWNER (Tablet) ========== -->
<div class="device-wrap" id="ownerView">
  <div class="tablet" id="tabletDevice">
    <!-- Login -->
    <div id="tabletLogin" style="display:flex;flex-direction:column;height:100%;">
      <div class="tab-topbar">
        <span class="tab-logo">予約管理システム <span class="api-badge live">LIVE API</span></span>
      </div>
      <div class="tab-body">
        <div class="tab-login">
          <div class="login-box">
            <h2>ログイン</h2>
            <div class="login-error" id="loginError"></div>
            <div class="form-group">
              <label>メールアドレス</label>
              <input class="form-input" id="loginEmail" type="email" value="admin@covalt.app">
            </div>
            <div class="form-group">
              <label>パスワード</label>
              <input class="form-input" id="loginPass" type="password" value="CovaltAdmin2026">
            </div>
            <button class="btn btn-primary" style="background:#0984e3;" onclick="doLogin()" id="loginBtn">ログイン</button>
            <p style="text-align:center;margin-top:12px;font-size:11px;color:#999;">API: ap-southeast-1</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Main app -->
    <div id="tabletApp" style="display:none;flex-direction:column;height:100%;">
      <div class="tab-topbar">
        <span class="tab-logo">予約管理システム</span>
        <div>
          <span class="tab-user" id="userEmail"></span>
          <button class="tab-logout" onclick="doLogout()">ログアウト</button>
        </div>
      </div>
      <div class="tab-body" id="tabBody"><div class="tab-inner" id="mainContent"></div></div>
      <div class="tab-nav" id="tabNav">
        <button class="active" data-page="dashboard" onclick="showPage('dashboard')"><span class="nav-icon">&#128203;</span>予約一覧</button>
        <button data-page="schedule" onclick="showPage('schedule')"><span class="nav-icon">&#128197;</span>スケジュール</button>
        <button data-page="customers" onclick="showPage('customers')"><span class="nav-icon">&#128101;</span>顧客</button>
        <button data-page="settings" onclick="showPage('settings')"><span class="nav-icon">&#9881;</span>設定</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<!-- Modal -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
/* ===== CONFIG ===== */
const API_BASE = 'https://4n1y1vgmbl.execute-api.ap-southeast-1.amazonaws.com';

/* ===== STATE ===== */
let authToken = null;
let currentUser = null; // {ownerId, email}
let cachedReservations = [];
let cachedCustomers = [];
let cachedBusinessHours = [];
let cachedClosedDays = [];

/* ===== API HELPER ===== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API_BASE + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    const msg = data?.message || data?.error || 'API Error ' + res.status;
    throw new Error(msg);
  }
  return data;
}

/* ===== UTILS ===== */
const TODAY = new Date();
const YEAR = TODAY.getFullYear(), MONTH = TODAY.getMonth(), DAY = TODAY.getDate();

function fmtDate(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}
function fmtTime(iso) {
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDateTime(iso) { return fmtDate(iso) + ' ' + fmtTime(iso); }
function isoDate(y, m, d) {
  const dt = new Date(y, m, d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function dateKey(d) { return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function statusLabel(s) {
  return s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : s === 'completed' ? '完了' : s;
}
const DAY_MAP = { MONDAY:'月', TUESDAY:'火', WEDNESDAY:'水', THURSDAY:'木', FRIDAY:'金', SATURDAY:'土', SUNDAY:'日' };
const DAY_KEYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

function switchView(v) {
  document.querySelectorAll('.top-tab button').forEach(b => b.classList.remove('active'));
  event.target.closest('button').classList.add('active');
  document.getElementById('customerView').classList.toggle('hidden', v !== 'customer');
  document.getElementById('ownerView').classList.toggle('hidden', v !== 'owner');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

let _loadingEl = null;
function showLoading() {
  if (_loadingEl) return;
  _loadingEl = document.createElement('div');
  _loadingEl.className = 'loading-overlay';
  _loadingEl.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(_loadingEl);
}
function hideLoading() {
  if (_loadingEl) { _loadingEl.remove(); _loadingEl = null; }
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}
function closeModal() { document.getElementById('modalBg').style.display = 'none'; }
document.getElementById('modalBg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

/* ========================================= */
/* ===== OWNER SIDE — LIVE API          ===== */
/* ========================================= */

/* --- Login --- */
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  btn.textContent = 'ログイン中...';
  btn.disabled = true;

  try {
    const res = await api('POST', '/api/auth/login', { email, password });
    authToken = res.token;
    // Decode user info via verify
    const user = await api('POST', '/api/auth/verify');
    currentUser = { ownerId: user.ownerId, email: user.email || email };
  } catch (e) {
    // If verify fails, still proceed with login token
    if (!authToken) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'ログイン';
      btn.disabled = false;
      return;
    }
    currentUser = { ownerId: '', email };
  }

  localStorage.setItem('covalt_token', authToken);
  localStorage.setItem('covalt_user', JSON.stringify(currentUser));
  document.getElementById('tabletLogin').style.display = 'none';
  document.getElementById('tabletApp').style.display = 'flex';
  document.getElementById('userEmail').textContent = currentUser.email;
  btn.textContent = 'ログイン';
  btn.disabled = false;
  showPage('dashboard');
}

async function doLogout() {
  try { await api('POST', '/api/auth/logout'); } catch(e) {}
  authToken = null;
  currentUser = null;
  localStorage.removeItem('covalt_token');
  localStorage.removeItem('covalt_user');
  document.getElementById('tabletApp').style.display = 'none';
  document.getElementById('tabletLogin').style.display = 'flex';
  showToast('ログアウトしました');
}

/* --- Navigation --- */
function showPage(page) {
  document.querySelectorAll('#tabNav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.getElementById('tabBody').scrollTop = 0;
  const mc = document.getElementById('mainContent');
  if (page === 'dashboard') renderDashboard(mc);
  else if (page === 'schedule') renderSchedule(mc);
  else if (page === 'customers') renderCustomers(mc);
  else if (page === 'settings') renderSettings(mc);
}

/* --- Dashboard --- */
let viewMode = 'month';
let ocMonth = MONTH, ocYear = YEAR;

async function renderDashboard(mc) {
  mc.innerHTML = '<div class="loading">読み込み中...</div>';

  // Determine date range based on view
  let startDate, endDate;
  if (viewMode === 'day') {
    startDate = isoDate(YEAR, MONTH, DAY);
    endDate = isoDate(YEAR, MONTH, DAY + 1);
  } else if (viewMode === 'week') {
    const dow = TODAY.getDay();
    const ws = new Date(YEAR, MONTH, DAY - dow);
    const we = new Date(YEAR, MONTH, DAY + (6 - dow));
    startDate = isoDate(ws.getFullYear(), ws.getMonth(), ws.getDate());
    endDate = isoDate(we.getFullYear(), we.getMonth(), we.getDate() + 1);
  } else {
    startDate = isoDate(ocYear, ocMonth, 1);
    const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
    endDate = isoDate(ocYear, ocMonth, lastDay + 1);
  }

  try {
    const data = await api('GET', '/api/owner/reservations?startDate=' + startDate + '&endDate=' + endDate);
    cachedReservations = data.reservations || [];
  } catch (e) {
    cachedReservations = [];
    showToast('予約取得エラー: ' + e.message, true);
  }

  let h = '<h1 class="page-title">予約一覧 <span style="font-size:12px;color:#999;">(' + cachedReservations.length + '件)</span></h1>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">';
  h += '<div class="view-toggle">';
  ['day','week','month','calendar'].forEach(v => {
    const label = {day:'日', week:'週', month:'月', calendar:'カレンダー'}[v];
    h += '<button class="' + (viewMode === v ? 'active' : '') + '" onclick="viewMode=\'' + v + '\';renderDashboard(document.getElementById(\'mainContent\'))">' + label + '</button>';
  });
  h += '</div></div>';

  if (viewMode === 'calendar') {
    h += renderOwnerCalendar();
  } else {
    const sorted = [...cachedReservations].sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
    h += '<div class="o-card"><table class="o-table"><thead><tr><th>予約ID</th><th>日時</th><th>顧客名</th><th>ステータス</th></tr></thead><tbody>';
    if (!sorted.length) {
      h += '<tr><td colspan="4" style="text-align:center;color:#999;padding:20px;">予約はありません</td></tr>';
    } else {
      sorted.forEach(r => {
        const shortId = r.reservationId.substring(0, 8);
        h += '<tr onclick="showReservationDetail(\'' + r.reservationId + '\')">';
        h += '<td>' + shortId + '...</td>';
        h += '<td>' + fmtDateTime(r.dateTime) + '</td>';
        h += '<td>' + (r.customerName || '-') + '</td>';
        h += '<td><span class="status-badge s-' + r.status + '">' + statusLabel(r.status) + '</span></td>';
        h += '</tr>';
      });
    }
    h += '</tbody></table></div>';
  }
  mc.innerHTML = h;
}

function renderOwnerCalendar() {
  const first = new Date(ocYear, ocMonth, 1);
  const lastDay = new Date(ocYear, ocMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(ocYear, ocMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];

  let h = '<div class="o-card" style="padding:12px;">';
  h += '<div class="oc-month"><button onclick="ocMonth--;if(ocMonth<0){ocMonth=11;ocYear--;}renderDashboard(document.getElementById(\'mainContent\'))">&#10094;</button><span>' + ocYear + '年' + (ocMonth+1) + '月</span><button onclick="ocMonth++;if(ocMonth>11){ocMonth=0;ocYear++;}renderDashboard(document.getElementById(\'mainContent\'))">&#10095;</button></div>';
  h += '<div class="oc-grid">';
  dows.forEach(d => h += '<div class="oc-dow">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="oc-cell oc-other"><div class="oc-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(ocYear, ocMonth, d);
    const isToday = d === DAY && ocMonth === MONTH && ocYear === YEAR;
    let cls = 'oc-cell';
    if (isToday) cls += ' oc-today';
    h += '<div class="' + cls + '"><div class="oc-num">' + d + '</div>';

    // Find reservations for this day
    const dayRsvs = cachedReservations.filter(r => {
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === ocYear && rd.getMonth() === ocMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    dayRsvs.forEach(r => {
      h += '<div class="oc-evt oc-' + r.status + '" onclick="event.stopPropagation();showReservationDetail(\'' + r.reservationId + '\')" title="' + fmtTime(r.dateTime) + ' ' + (r.customerName || '') + '">';
      h += fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4);
      h += '</div>';
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="oc-cell oc-other"><div class="oc-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

function renderScheduleCalendar() {
  const first = new Date(schYear, schMonth, 1);
  const lastDay = new Date(schYear, schMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const prevLast = new Date(schYear, schMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));

  let h = '<div class="o-card" style="padding:12px;">';
  h += '<div class="oc-month"><button onclick="schMonth--;if(schMonth<0){schMonth=11;schYear--;}renderSchedule(document.getElementById(\'mainContent\'))">&#10094;</button><span>' + schYear + '年' + (schMonth+1) + '月</span><button onclick="schMonth++;if(schMonth>11){schMonth=0;schYear++;}renderSchedule(document.getElementById(\'mainContent\'))">&#10095;</button></div>';
  h += '<div class="oc-grid">';
  dows.forEach(d => h += '<div class="oc-dow">' + d + '</div>');

  for (let i = 0; i < startDow; i++) {
    h += '<div class="oc-cell oc-other"><div class="oc-num">' + (prevLast - startDow + 1 + i) + '</div></div>';
  }

  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(schYear, schMonth, d);
    const iso = isoDate(schYear, schMonth, d);
    const isToday = d === DAY && schMonth === MONTH && schYear === YEAR;
    const isClosed = closedSet.has(iso);
    const isSel = schSelectedDate === iso;
    // Check day-of-week closed
    const jsDay = dt.getDay(); // 0=Sun
    const dayKeyMap = [null,'MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];
    const dayEnum = dayKeyMap[jsDay === 0 ? 7 : jsDay];
    const bh = cachedBusinessHours.find(b => b.dayOfWeek === dayEnum);
    const isRegularClosed = bh && !bh.isBusinessDay;

    let cls = 'oc-cell';
    if (isToday) cls += ' oc-today';
    if (isClosed || isRegularClosed) cls += ' oc-holiday';
    if (isSel) cls += '" style="outline:2px solid #0984e3;outline-offset:-2px;';

    h += '<div class="' + cls + '" onclick="selectSchDay(\'' + iso + '\')">';
    h += '<div class="oc-num">' + d + '</div>';

    // Show individual slots (available + booked) on calendar, same style as dashboard
    const slotInfo = schSlotSummary[iso];
    const availSlots = slotInfo ? (slotInfo.availableSlots || []) : [];

    // Build reservation lookup for this day (exclude cancelled)
    const dayRsvs = schReservations.filter(r => {
      if (r.status === 'cancelled') return false;
      const rd = new Date(r.dateTime);
      return rd.getFullYear() === schYear && rd.getMonth() === schMonth && rd.getDate() === d;
    }).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));

    // Merge available slots and reservations into a single timeline sorted by time
    const events = [];
    availSlots.forEach(s => {
      events.push({ time: s.startTime, type: 'available', label: s.startTime + ' 空き' });
    });
    dayRsvs.forEach(r => {
      events.push({ time: fmtTime(r.dateTime), type: r.status, label: fmtTime(r.dateTime) + ' ' + (r.customerName || '').substring(0, 4), rsvId: r.reservationId });
    });
    events.sort((a, b) => a.time.localeCompare(b.time));

    events.forEach(ev => {
      if (ev.type === 'available') {
        h += '<div class="oc-evt oc-available" title="' + ev.label + '">' + ev.label + '</div>';
      } else {
        h += '<div class="oc-evt oc-' + ev.type + '" onclick="event.stopPropagation();showReservationDetail(\'' + ev.rsvId + '\')" title="' + ev.label + '">' + ev.label + '</div>';
      }
    });
    h += '</div>';
  }

  const totalCells = startDow + lastDay;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    h += '<div class="oc-cell oc-other"><div class="oc-num">' + i + '</div></div>';
  }
  h += '</div></div>';
  return h;
}

function selectSchDay(iso) {
  schSelectedDate = iso;
  // Re-highlight selected day (update outline via re-render would be heavy, just load slots)
  loadDaySlots(iso);
}

async function loadDaySlots(dateStr) {
  const el = document.getElementById('schDayDetail');
  if (!el) return;
  el.innerHTML = '<div class="o-card"><div class="loading">スロット読み込み中...</div></div>';

  let slots = [];
  let dayRsvs = [];
  let isHoliday = false;
  try {
    // Fetch slots and reservations for this day in parallel
    const [y, m, d] = dateStr.split('-').map(Number);
    const nextDateStr = isoDate(y, m - 1, d + 1);
    const [slotRes, rsvRes] = await Promise.all([
      api('GET', '/api/schedule/slots/date/' + dateStr),
      api('GET', '/api/owner/reservations?startDate=' + dateStr + '&endDate=' + nextDateStr),
    ]);
    slots = slotRes.slots || [];
    dayRsvs = (rsvRes.reservations || []).sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
  } catch (e) {
    // fallback
  }
  // Check holiday via closed days cache
  const closedSet = new Set(cachedClosedDays.map(cd => cd.date));
  isHoliday = closedSet.has(dateStr);

  const d = new Date(dateStr + 'T00:00:00');
  const dayLabel = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
  const dowNames = ['日','月','火','水','木','金','土'];

  let h = '<div class="o-card">';
  h += '<h3 style="font-size:14px;margin-bottom:8px;">' + dayLabel + '（' + dowNames[d.getDay()] + '）のスロット・予約</h3>';

  if (isHoliday) {
    h += '<p style="color:#d32f2f;font-size:12px;">休業日</p>';
  } else if (slots.length === 0) {
    h += '<p style="color:#999;font-size:12px;">スロットがありません。「スロット生成」で作成してください。</p>';
  } else {
    // Build reservation lookup by reservationId
    const rsvByRsvId = {};
    dayRsvs.forEach(r => { rsvByRsvId[r.reservationId] = r; });

    h += '<div style="display:flex;flex-direction:column;gap:4px;">';
    slots.sort((a, b) => a.startTime.localeCompare(b.startTime)).forEach(s => {
      // Primary: slot status determines display
      const isBooked = s.status === 'booked';
      // Secondary: find linked reservation for customer info
      const r = s.reservationId ? rsvByRsvId[s.reservationId] : null;

      h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;';
      if (isBooked && r && r.status === 'confirmed') h += 'background:#f0f7ff;border-color:#90caf9;';
      else if (isBooked && r && r.status === 'completed') h += 'background:#f5f5f5;border-color:#ccc;';
      else if (isBooked) h += 'background:#fff8e1;border-color:#ffe082;';
      else h += 'background:#f9fff9;';
      h += '">';

      // Time
      h += '<span style="font-weight:700;width:90px;">' + s.startTime + ' - ' + s.endTime + '</span>';

      // Status: slot.status is the source of truth
      if (isBooked) {
        var label = '予約済';
        var badgeCls = 'background:#e3f2fd;color:#1565c0;';
        if (r && r.status === 'completed') { label = '完了'; badgeCls = 'background:#f5f5f5;color:#888;'; }
        h += '<span style="font-size:11px;padding:2px 8px;border-radius:10px;' + badgeCls + '">' + label + '</span>';
        h += '<span style="flex:1;">' + (r ? r.customerName || '' : '') + '</span>';
        if (r) h += '<span style="font-size:10px;color:#999;cursor:pointer;" onclick="showReservationDetail(\'' + r.reservationId + '\')">' + r.reservationId.substring(0,8) + '...</span>';
      } else {
        h += '<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;">空き</span>';
        h += '<span style="flex:1;"></span>';
        h += '<button style="background:none;border:1px solid #e57373;color:#e57373;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;" onclick="event.stopPropagation();deleteSlot(\'' + s.slotId + '\',\'' + dateStr + '\')">&times; 削除</button>';
      }

      h += '</div>';
    });
    h += '</div>';
  }

  // Quick generate button for this date
  h += '<div style="margin-top:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
  h += '<button class="btn btn-outline" style="width:auto;padding:5px 12px;font-size:11px;margin:0;" onclick="quickGenSlots(\'' + dateStr + '\')">一括生成</button>';
  h += '<select id="quickGenDur" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;"><option value="30">30分</option><option value="60" selected>60分</option><option value="90">90分</option></select>';
  h += '<select id="quickGenBuf" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;"><option value="0">バッファなし</option><option value="5">5分</option><option value="10">10分</option><option value="15">15分</option><option value="30">30分</option></select>';
  h += '</div>';
  h += '<div style="margin-top:6px;display:flex;gap:6px;align-items:center;">';
  h += '<input type="time" id="quickSingleStart" value="09:00" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;width:90px;">';
  h += '<span style="font-size:11px;">〜</span>';
  h += '<input type="time" id="quickSingleEnd" value="10:00" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;width:90px;">';
  h += '<button class="btn btn-outline" style="width:auto;padding:5px 12px;font-size:11px;margin:0;border-color:#00b894;color:#00b894;" onclick="quickAddSlot(\'' + dateStr + '\')">1枠追加</button>';
  h += '</div>';

  // Template apply for this date
  if (cachedTemplates.length > 0) {
    h += '<div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
    h += '<select id="quickTpl" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:11px;">';
    cachedTemplates.forEach(tpl => {
      h += '<option value="' + tpl.templateId + '">' + tpl.name + ' (' + tpl.entries.length + '枠)</option>';
    });
    h += '</select>';
    h += '<button class="btn btn-outline" style="width:auto;padding:5px 12px;font-size:11px;margin:0;border-color:#6c5ce7;color:#6c5ce7;" onclick="quickApplyTemplate(\'' + dateStr + '\')">テンプレ適用</button>';
    h += '</div>';
  }

  h += '</div>';
  el.innerHTML = h;
}

function renderCalendar() {
  const body = document.getElementById('liffBody');
  const first = new Date(calYear, calMonth, 1), lastDay = new Date(calYear, calMonth+1, 0).getDate(), startDow = first.getDay();
  const dows = ['日','月','火','水','木','金','土'];
  let h = '<div class="cal-month"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&#10094;</button><span>' + calYear + '年' + (calMonth+1) + '月</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&#10095;</button></div><div class="cal-grid">';
  dows.forEach(d => h += '<div class="cal-dow">' + d + '</div>');
  for (let i = 0; i < startDow; i++) h += '<div class="cal-day"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(calYear, calMonth, d), past = dt < new Date(YEAR, MONTH, DAY);
    const sel = selectedDate && dateKey(dt) === dateKey(selectedDate);
    const isTd = d === DAY && calMonth === MONTH && calYear === YEAR;
    let c = 'cal-day';
    if (past) c += ' disabled'; else if (sel) c += ' selected'; else if (isTd) c += ' today';
    h += '<div class="' + c + '" onclick="pickDate(' + calYear + ',' + calMonth + ',' + d + ')">' + d + '</div>';
  }
  h += '</div>';
  if (selectedDate) h += renderMockSlots(selectedDate);
  body.innerHTML = h;
}

function pickDate(y, m, d) { const dt = new Date(y, m, d); if (dt < new Date(YEAR, MONTH, DAY)) return; selectedDate = dt; renderCalendar(); }

function renderMockSlots(dt) {
  const dk = dateKey(dt), booked = MOCK_BOOKINGS.filter(b => dateKey(b.date) === dk && b.status === 'confirmed').map(b => b.time);
  let h = '<h4 style="font-size:14px;margin-bottom:8px;">' + fmt(dt) + ' の空き状況</h4><div class="slot-list">';
  HOURS.forEach(t => {
    const tk = booked.includes(t);
    h += '<div class="slot-item' + (tk ? ' booked' : '') + '" ' + (tk ? '' : 'onclick="selectMockSlot(\'' + t + '\')"') + '><span>' + t + '</span><span class="slot-status ' + (tk ? 'taken' : 'open') + '">' + (tk ? '予約済' : '予約可') + '</span></div>';
  });
  return h + '</div>';
}

function selectMockSlot(time) {
  document.getElementById('liffBody').innerHTML = '<h4 style="font-size:15px;margin-bottom:8px;">予約内容の確認</h4><div class="confirm-box"><dt>日付</dt><dd>' + fmt(selectedDate) + '</dd><dt>時間</dt><dd>' + time + '</dd><dt>予約ID</dt><dd>RSV-' + String(nextMockId).padStart(3,'0') + '</dd></div><button class="btn btn-primary" onclick="confirmMockBooking(\'' + time + '\')">予約を確定する</button><button class="btn btn-outline" onclick="renderBookingLiff()">戻る</button>';
}

function confirmMockBooking(time) {
  const id = 'RSV-' + String(nextMockId).padStart(3, '0');
  nextMockId++;
  MOCK_BOOKINGS.push({id, date: new Date(selectedDate), time, customer: '田中 太郎', customerId: 1, status: 'confirmed'});
  document.getElementById('liffBody').innerHTML = '<div style="text-align:center;padding:40px 0;"><div style="font-size:48px;margin-bottom:16px;">&#10004;</div><h3 style="font-size:18px;margin-bottom:8px;">予約が確定しました</h3><p style="font-size:13px;color:#666;">' + fmt(selectedDate) + ' ' + time + '</p><p style="font-size:12px;color:#999;margin-top:4px;">' + id + '</p><button class="btn btn-outline" style="margin-top:24px;" onclick="liffClose()">閉じる</button></div>';
  addBotMsg('予約が確定しました\n\n日時: ' + fmt(selectedDate) + ' ' + time + '\n予約ID: ' + id + '\n\nご来店お待ちしております。');
}

function renderListLiff() {
  document.getElementById('lineTitle').textContent = '予約確認';
  const upcoming = MOCK_BOOKINGS.filter(b => b.customerId === 1 && b.status === 'confirmed' && b.date >= new Date(YEAR, MONTH, DAY)).sort((a, b) => a.date - b.date);
  let h = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">予約一覧</span></div><div class="liff-body">';
  if (!upcoming.length) h += '<p style="color:#999;text-align:center;padding:40px 0;">今後の予約はありません</p>';
  else upcoming.forEach(b => {
    h += '<div class="booking-card"><span class="bk-date">' + fmt(b.date) + ' ' + b.time + '</span><span class="bk-status confirmed">確定</span><div class="bk-id">' + b.id + '</div></div>';
  });
  document.getElementById('liffOverlay').innerHTML = h + '</div>';
}

function renderHistoryLiff() {
  document.getElementById('lineTitle').textContent = '予約履歴';
  const statusLabelMock = s => s === 'confirmed' ? '確定' : s === 'cancelled' ? 'キャンセル済' : '完了';
  const past = MOCK_BOOKINGS.filter(b => b.customerId === 1 && (b.status === 'done' || b.status === 'cancelled' || b.date < new Date(YEAR, MONTH, DAY))).sort((a, b) => b.date - a.date);
  let h = '<div class="liff-header"><button class="close-btn" onclick="liffClose()">&times;</button><span class="liff-title">予約履歴</span></div><div class="liff-body">';
  if (!past.length) h += '<p style="color:#999;text-align:center;padding:40px 0;">履歴はありません</p>';
  else past.forEach(b => { h += '<div class="booking-card"><span class="bk-date">' + fmt(b.date) + ' ' + b.time + '</span><span class="bk-status ' + b.status + '">' + statusLabelMock(b.status) + '</span><div class="bk-id">' + b.id + '</div></div>'; });
  document.getElementById('liffOverlay').innerHTML = h + '</div>';
}

/* INIT */
(function restoreSession() {
  const savedToken = localStorage.getItem('covalt_token');
  const savedUser = localStorage.getItem('covalt_user');
  if (savedToken && savedUser) {
    authToken = savedToken;
    try { currentUser = JSON.parse(savedUser); } catch(e) { return; }
    // Verify token is still valid
    api('POST', '/api/auth/verify').then(user => {
      currentUser = { ownerId: user.ownerId, email: user.email || currentUser.email };
      localStorage.setItem('covalt_user', JSON.stringify(currentUser));
      document.getElementById('tabletLogin').style.display = 'none';
      document.getElementById('tabletApp').style.display = 'flex';
      document.getElementById('userEmail').textContent = currentUser.email;
      showPage('dashboard');
    }).catch(() => {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('covalt_token');
      localStorage.removeItem('covalt_user');
    });
  }
})();
initChat();
</script>
